<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0B0C">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Worldsense">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Worldsense OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0B0C;--s1:#121213;--s2:#171718;--s3:#1D1D1F;--s4:#242427;
    --b1:#202023;--b2:#2C2C30;--b3:#3B3B40;
    --w:#F3F3F4;--hi:#E9E9EB;--mid:#98989E;--dim:#5E5E64;--ghost:#3A3A3F;
    --red:#FF5D52;--amber:#FFC24B;--green:#3DDC84;--blue:#D6D6DA;--cyan:#C9C9CE;--purple:#B0B0B6;
    --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;--disp:'Space Grotesk',var(--sans);
    --rad:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--w);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:var(--sans);background:var(--s2);border:1px solid var(--b2);color:var(--w);border-radius:10px;padding:9px 11px;font-size:13px;outline:none;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);}
  input.mono{font-family:var(--mono);text-align:right;}
  ::placeholder{color:var(--dim);}
  textarea{min-height:70px;resize:vertical;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
  a{color:var(--blue);text-decoration:none;}
  .mono{font-family:var(--mono);} .pos{color:var(--green);} .neg{color:var(--red);} .muted{color:var(--mid);} .hint{font-size:11px;color:var(--dim);}
  .lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--dim);}
  kbd{font-family:var(--mono);font-size:10px;color:var(--mid);border:1px solid var(--b2);border-bottom-width:2px;border-radius:6px;padding:2px 6px;background:var(--s2);}

  /* ── shell: floating auto-hide sidebar + centered content ── */
  #shell{min-height:100vh;}
  body{padding-left:88px;}
  #side{position:fixed;left:14px;top:14px;z-index:70;width:66px;max-height:calc(100vh - 100px);
    background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:12px 10px;
    display:flex;flex-direction:column;gap:4px;overflow:hidden;
    transition:width .18s ease,box-shadow .18s ease;box-shadow:0 10px 34px rgba(0,0,0,.45);}
  #side:hover,#side.pinned{width:236px;box-shadow:0 16px 50px rgba(0,0,0,.55);}
  .topline{display:flex;align-items:center;gap:0;padding:2px 0 12px;min-height:48px;}
  #side:hover .topline,#side.pinned .topline{padding-left:8px;gap:8px;}
  .logomini{flex:1;display:flex;align-items:center;justify-content:center;}
  .logomini svg{width:38px;height:auto;display:block;}
  .logofull{display:flex;align-items:center;gap:8px;opacity:0;width:0;overflow:hidden;white-space:nowrap;transition:opacity .15s;}
  .logofull svg{height:30px;width:auto;display:block;}
  #side:hover .logofull,#side.pinned .logofull{opacity:1;width:auto;margin-right:auto;}
  #side:hover .logomini,#side.pinned .logomini{display:none;}
  .pinbtn{opacity:0;color:var(--dim);width:0;height:26px;padding:0;overflow:hidden;border-radius:8px;flex:0 0 auto;transition:opacity .15s,width .15s;display:flex;align-items:center;justify-content:center;}
  .pinbtn:hover{color:var(--w);background:var(--s3);}
  #side:hover .pinbtn,#side.pinned .pinbtn{opacity:1;width:26px;}
  #side.pinned .pinbtn{color:var(--blue);transform:rotate(45deg);}
  .nbtn{display:flex;align-items:center;gap:11px;font-size:13.5px;font-weight:500;color:var(--mid);padding:10px 14px;border-radius:10px;text-align:left;width:100%;}
  .nbtn svg{width:17px;height:17px;flex:0 0 auto;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
  .nbtn:hover{color:var(--hi);background:var(--s2);}
  .nbtn.active{color:var(--w);background:var(--s2);}
  .nbtn .lab,.nbtn .nend{opacity:0;transition:opacity .15s;white-space:nowrap;}
  .nbtn .nend{margin-left:auto;display:flex;gap:7px;align-items:center;}
  .nbtn .cnt{font-family:var(--mono);font-size:10px;color:var(--blue);}
  #side:hover .nbtn .lab,#side.pinned .nbtn .lab,#side:hover .nbtn .nend,#side.pinned .nbtn .nend{opacity:1;}

  /* account circle bottom-left */
  #acct{position:fixed;left:22px;bottom:22px;z-index:80;}
  #gearc{position:fixed;right:22px;bottom:22px;z-index:80;}
  #gear-pop{display:none;position:absolute;right:0;bottom:54px;width:250px;background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:14px;box-shadow:0 16px 50px rgba(0,0,0,.55);}
  #gearc.open #gear-pop{display:block;}
  .acctbtn{width:44px;height:44px;border-radius:50%;background:var(--s2);border:1px solid var(--b2);color:var(--w);font-family:var(--disp);font-weight:600;font-size:16px;box-shadow:0 8px 26px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;}
  .acctbtn:hover{border-color:var(--b3);background:var(--s3);}
  #acct-pop{display:none;position:absolute;left:0;bottom:54px;width:230px;background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:14px;box-shadow:0 16px 50px rgba(0,0,0,.55);}
  #acct.open #acct-pop{display:block;}
  #acct-pop .name{font-weight:600;font-size:13px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #acct-pop .mail{font-size:11px;color:var(--dim);margin-bottom:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .seg{display:inline-flex;border:1px solid var(--b2);border-radius:9px;overflow:hidden;width:100%;}
  .seg button{flex:1;font-family:var(--mono);font-size:10px;padding:7px 0;color:var(--dim);}
  .seg button.on{background:var(--s3);color:var(--w);}
  #acct-pop .grid{gap:8px;margin-bottom:10px;}

  .wordmark{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:-0.01em;padding:4px 10px 16px;display:flex;align-items:center;gap:8px;}
  .wordmark svg{height:26px;width:auto;display:block;}
  .loginbox .wordmark svg{height:34px;}

  main{max-width:1060px;margin:0 auto;padding:26px 26px 70px;width:100%;}
  h1.view{font-family:var(--disp);font-size:23px;font-weight:600;letter-spacing:-0.01em;}
  .vsub{color:var(--mid);font-size:13px;margin:3px 0 20px;}
  .vhead{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}

  .grid{display:grid;gap:12px;}
  .g4{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}
  .g3{grid-template-columns:repeat(auto-fit,minmax(200px,1fr));}
  .g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}
  .card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:16px;}
  .card h2{font-size:13px;font-weight:600;margin-bottom:12px;}
  .stat .sl{font-family:var(--mono);font-size:8.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:9px;}
  .stat .sv{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:-0.03em;line-height:1;}
  .stat .sn{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:6px;}
  .bento{display:grid;grid-template-columns:1.9fr 1fr;gap:12px;margin-bottom:12px;}
  .bento.rev{grid-template-columns:1fr 1fr;}
  .bstack{display:grid;gap:12px;grid-template-rows:repeat(3,1fr);}
  .hero .big{font-family:var(--mono);font-size:34px;font-weight:600;letter-spacing:-0.03em;margin:8px 0 10px;}
  .grid.m5{grid-template-columns:repeat(5,1fr);}
  .grid.m32{grid-template-columns:3fr 2fr;}
  @media(max-width:900px){.grid.m5{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}.grid.m32{grid-template-columns:1fr;}}
  .grid.mini .stat{padding:12px 14px;}
  .grid.mini .stat .sv{font-size:17px;}
  .grid.mini .stat .sl{margin-bottom:6px;}
  @media(max-width:900px){.bento,.bento.rev{grid-template-columns:1fr;}.bstack{grid-template-rows:none;grid-template-columns:repeat(2,1fr);}.bstack>*:last-child:nth-child(odd){grid-column:1/-1;}.grid.mini>.stat:last-child:nth-child(odd),.grid.g3>.stat:last-child:nth-child(odd){grid-column:1/-1;}}

  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1);}
  .row:last-child{border-bottom:none;} .n{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:0.05em;padding:9px 14px;border-radius:10px;border:1px solid var(--b2);background:var(--s2);color:var(--w);}
  .btn:hover{border-color:var(--b3);background:var(--s3);}
  .btn.pri{background:#FFFFFF;border-color:#FFFFFF;color:#0B0D10;font-weight:600;}
  .btn.pri:hover{filter:brightness(0.92);}
  .btn.pri kbd{background:#0B0D10;color:#FFFFFF;border-color:#0B0D10;}
  .btn.sm{padding:6px 10px;font-size:10px;} .btn.danger{color:var(--red);border-color:#472622;}
  .btn.pay{color:var(--green);border-color:#1d3d2a;} .btn.pay:hover{background:#10231a;}
  .ib{width:26px;height:26px;border:1px solid var(--b2);border-radius:8px;background:var(--s2);color:var(--mid);font-size:12px;line-height:1;padding:0;}
  .ib:hover{color:var(--w);border-color:var(--b3);} .ib.danger{color:var(--red);}
  .tag{font-family:var(--mono);font-size:9px;letter-spacing:0.04em;padding:3px 7px;border-radius:6px;border:1px solid var(--b2);color:var(--mid);white-space:nowrap;}
  .pill{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;letter-spacing:0.04em;border:1px solid var(--b2);}
  .overdue{color:var(--red);border-color:#472622;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  td,th{padding:10px 8px;text-align:left;border-bottom:1px solid var(--b1);}
  th{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);font-weight:400;}
  td.n,th.n{text-align:right;}
  tr.tot td{border-top:1px solid var(--b3);border-bottom:none;font-weight:600;padding-top:12px;}
  tr:last-child td{border-bottom:none;}

  .prog{height:6px;border-radius:4px;background:var(--s3);overflow:hidden;}
  .prog div{height:100%;background:var(--blue);border-radius:4px;}
  .empty{text-align:center;color:var(--dim);padding:38px 16px;font-size:13px;border:1px dashed var(--b2);border-radius:12px;}
  .empty b{color:var(--mid);display:block;margin-bottom:6px;font-weight:500;}

  .modal-bg{position:fixed;inset:0;background:rgba(5,7,9,.7);display:flex;align-items:flex-start;justify-content:center;padding:54px 16px;z-index:100;overflow:auto;backdrop-filter:blur(3px);}
  .modal{background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:20px;width:100%;max-width:520px;}
  .modal h3{font-family:var(--disp);font-size:15px;font-weight:600;margin-bottom:14px;}
  .modal .field-stack{display:grid;gap:12px;margin-bottom:16px;}
  .modal .fs label{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:5px;}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--s4);border:1px solid var(--b3);color:var(--hi);font-family:var(--mono);font-size:11px;padding:10px 16px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;max-width:90vw;}
  #toast.on{opacity:1;}
  .comment{padding:10px 0;border-bottom:1px solid var(--b1);}
  .comment:last-child{border-bottom:none;}
  .comment .meta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:4px;}
  .comment .meta b{color:var(--mid);font-weight:500;}
  .quickadd{display:flex;gap:8px;margin-bottom:16px;}
  /* linear-style task list */
  .tgroup{margin-top:14px;}
  .tghead{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:10px 10px 0 0;font-size:12px;font-weight:600;}
  .tghead .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .tghead .c{font-family:var(--mono);font-size:10px;color:var(--dim);font-weight:400;}
  .tlist{border:1px solid var(--b1);border-top:none;border-radius:0 0 10px 10px;background:var(--s1);overflow:hidden;}
  .trow{display:flex;align-items:center;gap:9px;padding:7px 12px;border-bottom:1px solid var(--b1);cursor:pointer;min-height:38px;}
  .trow:last-child{border-bottom:none;}
  .trow:hover{background:var(--s2);}
  .trow .sicon{width:16px;height:16px;flex:0 0 auto;display:flex;cursor:pointer;}
  .trow .sicon svg{width:16px;height:16px;}
  .trow .pico{width:14px;height:14px;flex:0 0 auto;}
  .trow .tid{font-family:var(--mono);font-size:10.5px;color:var(--dim);flex:0 0 52px;}
  .trow .tt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px;}
  .trow.tdone .tt{color:var(--dim);text-decoration:line-through;}
  .trow .meta{display:flex;gap:6px;align-items:center;flex:0 0 auto;}
  .trow .del{opacity:0;transition:opacity .12s;}
  .trow:hover .del{opacity:1;}
  .avc{width:20px;height:20px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--mid);flex:0 0 auto;}
  .quickadd input{flex:1;}
  .sharebar{margin-bottom:11px;}
  .sharebar .t{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px;}
  .checkbox{width:17px;height:17px;flex:0 0 auto;accent-color:var(--green);cursor:pointer;}
  .ttitle{cursor:pointer;} .ttitle:hover{color:var(--blue);}
  .shrow{display:grid;grid-template-columns:1fr 84px 30px;gap:8px;align-items:center;margin-bottom:7px;}
  .entlogo{display:flex;align-items:center;}
  .entlogo svg{height:100%;width:auto;max-width:100%;display:block;}
  .kbrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b1);font-size:13px;}
  .kbrow:last-child{border-bottom:none;}
  .kbrow .keys{display:flex;gap:5px;}

  /* login */
  #login-root{position:fixed;inset:0;z-index:150;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;}
  .loginbox{width:100%;max-width:350px;}
  .loginbox .wordmark{justify-content:center;font-size:21px;padding-bottom:4px;}
  .loginbox .sub{color:var(--mid);font-size:12px;text-align:center;margin-bottom:20px;}
  .loginbox .fs{margin-bottom:12px;} .loginbox label{display:block;font-size:11px;color:var(--mid);margin-bottom:5px;}
  .lg-err{color:var(--amber);font-size:12px;text-align:center;min-height:16px;margin-top:10px;}

  /* mobile */
  #tabbar{display:none;}
  #mobiletop{display:none;position:sticky;top:0;z-index:65;background:rgba(12,14,17,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--b1);grid-template-columns:1fr auto 1fr;align-items:center;padding:10px 12px calc(10px);padding-top:calc(10px + env(safe-area-inset-top));}
  .mtl{display:flex;gap:8px;}
  .ib.big{width:36px;height:36px;border-radius:10px;}
  .mtlogo{display:flex;justify-content:center;}
  .emeta{display:flex;flex-wrap:wrap;align-items:center;gap:5px 8px;line-height:1.4;}
  .mtlogo svg{height:30px !important;width:auto !important;}
  .mtlogo svg{height:22px;width:auto;}
  #acct-btn-m{justify-self:end;width:34px;height:34px;font-size:13px;box-shadow:none;}
  #drawer{position:fixed;top:0;bottom:0;left:0;width:272px;background:var(--s1);border-right:1px solid var(--b1);z-index:130;transform:translateX(-105%);transition:transform .2s ease;padding:calc(16px + env(safe-area-inset-top)) 12px 16px;display:flex;flex-direction:column;gap:4px;overflow:auto;}
  #drawer.open{transform:none;}
  #drawer .dlogo{padding:2px 10px 16px;}
  #drawer .dlogo svg{height:34px;width:auto;}
  #drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:120;display:none;}
  #drawer-bg.open{display:block;}
  @media(max-width:760px){
    body{padding-left:0;}
    #side,#acct,#gearc{display:none;}
    #mobiletop{display:grid !important;}
    main{padding:16px 14px calc(84px + env(safe-area-inset-bottom));}
    #tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(12,14,17,.92);backdrop-filter:blur(12px);border-top:1px solid var(--b1);padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
    #tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 1px;color:var(--dim);font-size:9px;border-radius:10px;}
    #tabbar button svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
    #tabbar button.active{color:var(--w);}
    h1.view{font-size:20px;} .stat .sv{font-size:19px;}
    input,select,textarea{font-size:16px;}
    .card{padding:13px;overflow-x:auto;} .card>table{min-width:max-content;}
    .btn{min-height:40px;} .btn.sm{min-height:32px;}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
</head>
<body>
<div id="mobiletop">
  <div class="mtl">
    <button class="ib big" onclick="toggleDrawer()" aria-label="menu"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
  </div>
  <div class="mtlogo" id="mt-logo"></div>
  <button class="acctbtn mob" id="acct-btn-m" onclick="openAcctModal()" aria-label="account">•</button>
</div>
<div id="drawer-bg" onclick="toggleDrawer()"></div>
<aside id="drawer"><div class="dlogo" id="dr-logo"></div><div id="drawer-nav"></div><div style="flex:1"></div><button class="nbtn" onclick="closeDrawer();openGearModal()"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l7 4v10l-7 4-7-4V7z"/><circle cx="12" cy="12" r="2.6"/></svg><span class="lab" style="opacity:1">НАСТРОЙКИ</span></button></aside>

const KEY={settings:'ws3:settings',costs:'ws3:costs',income:'ws3:income',tasks:'ws3:tasks',payroll:'ws3:payroll',tx:'ws3:tx',contracts:'ws3:contracts',orders:'ws3:orders',debts:'ws3:debts',docs:'ws3:docs',invoices:'ws3:invoices'};

function loadSupabase(){return new Promise((res,rej)=>{if(window.supabase)return res();const sc=document.createElement('script');sc.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';let done=false;const to=setTimeout(()=>{if(!done){done=true;rej(new Error('timeout'));}},9000);sc.onload=()=>{if(!done){done=true;clearTimeout(to);res();}};sc.onerror=()=>{if(!done){done=true;clearTimeout(to);rej(new Error('CDN'));}};document.head.appendChild(sc);});}
async function sGet(k){try{const tbl=PRIVATE_KEYS.has(k)?'app_private':'app_shared';const r=await sb.from(tbl).select('value').eq('key',k).maybeSingle();if(r.error)throw r.error;return r.data?r.data.value:null;}catch(e){return null;}}
async function sSet(k,v){try{const tbl=PRIVATE_KEYS.has(k)?'app_private':'app_shared';const r=await sb.from(tbl).upsert({key:k,value:v,updated_at:new Date().toISOString()});if(r.error)throw r.error;}catch(e){toast(t('Ошибка синхронизации','Sync error'));}}
function save(p){if(KEY[p])sSet(KEY[p],DB[p]);}
async function loadAll(){
  const s=await sGet(KEY.settings);
  DB.settings=s||{fx:12650,entities:[]};
  if(!DB.settings.fx)DB.settings.fx=12650;
  if(!Array.isArray(DB.settings.entities))DB.settings.entities=[];
  DB.settings.entities.forEach(e=>{if(!Array.isArray(e.shareholders))e.shareholders=[];});

  DB.income=await sGet(KEY.income)||[];
  DB.tasks=await sGet(KEY.tasks)||[];
  DB.debts=await sGet(KEY.debts)||[];
  DB.docs=await sGet(KEY.docs)||[];
  DB.invoices=await sGet(KEY.invoices)||[];
  DB.contracts=await sGet(KEY.contracts)||[];
  DB.orders=await sGet(KEY.orders)||[];
  DB.payroll=await sGet(KEY.payroll)||{people:[]};

  DB.tx=await sGet(KEY.tx)||[];
}

/* ── helpers ── */
const uid=p=>p+'-'+Math.random().toString(36).slice(2,8);
const fmt0=n=>Math.round(n||0).toLocaleString('en-US');
const fmt1=n=>(Math.round((n||0)*10)/10).toLocaleString('en-US');
const pct=n=>(Math.round((n||0)*10)/10)+'%';
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toUSD(a,c){return c==='UZS'?(a/(DB.settings.fx||1)):c==='EUR'?(a*(DB.settings.fxEur||1.08)):a;}
function curOpts(sel){return ['USD','EUR','UZS'].map(c=>`<option ${sel===c?'selected':''}>${c}</option>`).join('');}
function fmtRaw(v){return Math.round(v).toLocaleString('en-US');}
function balByCur(){const b={USD:0,EUR:0,UZS:0};DB.settings.entities.forEach(e=>{b.USD+=e.opening||0;});DB.tx.forEach(x=>{const c=x.currency||'USD';b[c]=(b[c]||0)+(x.kind==='in'?1:-1)*x.amount;});return b;}
function balLine(){const b=balByCur();const s=[];if(Math.round(b.USD))s.push('$'+fmtRaw(b.USD));if(Math.round(b.EUR))s.push('€'+fmtRaw(b.EUR));if(Math.round(b.UZS))s.push(fmtRaw(b.UZS)+' '+t('сум','UZS'));return s.join(' · ')||'$0';}
function money(v){if(DISPLAY==='UZS'){const x=v*(DB.settings.fx||1);return (x<0?'−':'')+fmt0(Math.abs(x))+t(' сум',' UZS');}return (v<0?'−$':'$')+fmt0(Math.abs(v));}
const entName=id=>{const e=DB.settings.entities.find(e=>e.id===id);return e?e.name:'—';};
const personName=id=>{const p=DB.payroll.people.find(p=>p.id===id);return p?p.name:'';};

/* ── money math ── */
function entityBalance(id){let b=(DB.settings.entities.find(e=>e.id===id)||{}).opening||0;DB.tx.forEach(x=>{if(x.entityId===id){const u=toUSD(x.amount,x.currency);b+=(x.kind==='in'?u:-u);}});return b;}
function totalBalance(){return DB.settings.entities.reduce((s,e)=>s+entityBalance(e.id),0);}

/* ── dispatcher ── */
function render(){
  if(!DB.settings)return;
  renderChrome();
  const a=document.getElementById('app');
  const allowed=tabsFor().map(x=>x[0]);
  if(!allowed.includes(view))view=allowed[0];
  if(view==='dash')a.innerHTML=viewDash();
  else if(view==='team')a.innerHTML=viewTeam();
  else if(view==='tasks')a.innerHTML=viewTasks();
  else if(view==='fin')a.innerHTML=viewFin();
  else if(view==='projects')a.innerHTML=viewProjects();
  else if(view==='contracts')a.innerHTML=viewContracts();
  else if(view==='structure')a.innerHTML=viewStructure();
  else if(view==='docs')a.innerHTML=viewDocs();
  const qa=document.getElementById('qa-input');
  if(qa)qa.onkeydown=e=>{if(e.key==='Enter')quickAddTask();};
}

/* ── dashboard ── */
function last30(){const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);}
function flows30(){const d30=last30();
  const d60=(()=>{const d=new Date();d.setDate(d.getDate()-60);return d.toISOString().slice(0,10);})();
  let inn=0,out=0,pay=0,uzsOut=0,inCnt=0,pInn=0,pOut=0;const cats={},srcs={};
  DB.tx.forEach(x=>{const u=toUSD(x.amount,x.currency);
    if(x.date>=d30){
      if(x.kind==='in'){inn+=u;inCnt++;const k=x.who||x.memo||t('Прочее','Other');srcs[k]=(srcs[k]||0)+u;}
      else{out+=u;if(x.currency==='UZS')uzsOut+=u;const k=x.kind==='payout'?t('ФОТ','Payroll'):(x.category?catL(x.category):t('Прочее','Other'));cats[k]=(cats[k]||0)+u;if(x.kind==='payout')pay+=u;}
    } else if(x.date>=d60){ if(x.kind==='in')pInn+=u; else pOut+=u; }});
  return {inn,out,pay,net:inn-out,cats,srcs,uzsOut,inCnt,pInn,pOut};}
function monthlySeries(n){const arr=[];const now=new Date();
  for(let i=n-1;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);const key=d.toISOString().slice(0,7);arr.push({key,inn:0,out:0});}
  const map={};arr.forEach(a=>map[a.key]=a);
  DB.tx.forEach(x=>{const k=(x.date||'').slice(0,7);if(map[k]){const u=toUSD(x.amount,x.currency);if(x.kind==='in')map[k].inn+=u;else map[k].out+=u;}});
  return arr;}
function monthlyBarsSVG(arr){
  const W=560,H=180,pl=8,pr=8,pt=14,pb=26;
  const maxV=Math.max(1,...arr.map(a=>Math.max(a.inn,a.out)));
  const n=arr.length,slot=(W-pl-pr)/n,bw=Math.min(20,slot*0.28);
  const y=v=>pt+(1-v/maxV)*(H-pt-pb);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><line x1="${pl}" y1="${H-pb}" x2="${W-pr}" y2="${H-pb}" stroke="var(--b2)"/>${arr.map((a,i)=>{const cx=pl+slot*i+slot/2;const y1=y(a.inn),y2=y(a.out);return `<rect x="${(cx-bw-1.5).toFixed(1)}" y="${y1.toFixed(1)}" width="${bw}" height="${Math.max(1,H-pb-y1).toFixed(1)}" rx="2.5" fill="var(--green)" opacity="0.9"/><rect x="${(cx+1.5).toFixed(1)}" y="${y2.toFixed(1)}" width="${bw}" height="${Math.max(1,H-pb-y2).toFixed(1)}" rx="2.5" fill="var(--red)" opacity="0.85"/><text x="${cx.toFixed(1)}" y="${H-9}" text-anchor="middle" fill="var(--dim)" style="font:9px var(--mono)">${a.key.slice(5)}</text>`;}).join('')}</svg>
  <div class="hint" style="display:flex;gap:14px;margin-top:6px"><span><span style="color:var(--green)">■</span> ${t('доход','income')}</span><span><span style="color:var(--red)">■</span> ${t('расход','spend')}</span></div>`;}
function cashProjSVG(bal0,net){
  const months=12,pts=[];for(let m=0;m<=months;m++)pts.push(bal0+net*m);
  const maxV=Math.max(...pts,0),minV=Math.min(...pts,0);
  const W=640,H=210,pl=10,pr=14,pt=16,pb=24,span=(maxV-minV)||1;
  const sx=m=>pl+(m/months)*(W-pl-pr),sy=v=>pt+(1-(v-minV)/span)*(H-pt-pb);
  const zeroY=sy(0).toFixed(1);
  const line=pts.map((v,m)=>`${sx(m).toFixed(1)},${sy(v).toFixed(1)}`).join(' ');
  const area=`${pl},${zeroY} `+line+` ${sx(months).toFixed(1)},${zeroY}`;
  const ending=pts[months];const col=ending>=0?'var(--green)':'var(--red)';
  const runM=(net<0&&bal0>0)?bal0/(-net):null;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" role="img"><line x1="${pl}" y1="${zeroY}" x2="${W-pr}" y2="${zeroY}" stroke="var(--b2)" stroke-dasharray="4 4"/><polygon points="${area}" fill="${col}" opacity="0.10"/><polyline points="${line}" fill="none" stroke="${col}" stroke-width="2.2"/>${runM!==null&&runM<=months?`<line x1="${sx(runM).toFixed(1)}" y1="${pt}" x2="${sx(runM).toFixed(1)}" y2="${H-pb}" stroke="var(--amber)" stroke-dasharray="3 3"/><circle cx="${sx(runM).toFixed(1)}" cy="${zeroY}" r="3.5" fill="var(--amber)"/><text x="${sx(runM).toFixed(1)}" y="${pt-4}" text-anchor="middle" fill="var(--amber)" style="font:9px var(--mono)">${addMonths(runM)}</text>`:''}<text x="${pl}" y="${H-7}" fill="var(--dim)" style="font:9px var(--mono)">${t('сейчас','now')} ${money(bal0)}</text><text x="${W-pr}" y="${H-7}" text-anchor="end" fill="var(--dim)" style="font:9px var(--mono)">+12${t('м','m')}: ${money(ending)}</text></svg>`;
}
function shareBars(items,total){
  return items.map(i=>`<div class="sharebar"><div class="t"><span style="font-weight:500">${esc(i.label)}</span><span class="mono">${money(i.value)} <span class="hint">${pct(total>0?i.value/total*100:0)}</span></span></div><div class="prog"><div style="width:${(total>0?i.value/total*100:0).toFixed(1)}%;background:${i.color||'var(--blue)'}"></div></div></div>`).join('');
}
function focusTasks(list){
  const td=today();
  const ord={urgent:0,high:1,med:2};
  return list.filter(x=>x.status!=='done').sort((a,b)=>{const ao=a.due&&a.due<td?0:1,bo=b.due&&b.due<td?0:1;if(ao!==bo)return ao-bo;return (ord[a.priority]??3)-(ord[b.priority]??3);}).slice(0,7);
}
function viewDash(){
  const td=today();
  const active=DB.tasks.filter(x=>x.status!=='done').length;
  const overdue=DB.tasks.filter(x=>x.status!=='done'&&x.due&&x.due<td).length;
  const f=flows30();
  const pMoPlan=payrollMo(),bal=totalBalance();
  const runway=(f.net<0&&bal>0)?bal/(-f.net):null;
  const heads=DB.payroll.people.length;
  const catItems=Object.entries(f.cats).map(([k,v])=>({label:k,value:v})).sort((a,b)=>b.value-a.value);
  const balItems=DB.settings.entities.map(e=>({label:e.name,value:entityBalance(e.id)})).filter(i=>i.value!==0);
  const srcArr=Object.entries(f.srcs).sort((a,b)=>b[1]-a[1]);
  const conc=(srcArr.length&&f.inn>0)?srcArr[0][1]/f.inn*100:0;
  const activeContracts=DB.contracts.filter(c=>c.status==='active');
  const contractSum=activeContracts.reduce((s,c)=>s+toUSD(c.amount||0,c.currency),0);
  const backlog=DB.orders.filter(p=>p.status!=='done').reduce((s,p)=>{const st=ordStats(p);return s+Math.max(0,st.value-st.earned);},0);
  const avgContract=activeContracts.length?contractSum/activeContracts.length:0;
  const pTot=DB.orders.reduce((s,p)=>s+(p.target||0),0),pCol=DB.orders.reduce((s,p)=>s+ordCollected(p),0);
  const projPct=pTot>0?pCol/pTot*100:null;
  const doneCnt=DB.tasks.filter(x=>x.status==='done').length;
  const urgCnt=DB.tasks.filter(x=>x.status!=='done'&&x.priority==='urgent').length;
  return `<h1 class="view">${t('Дашборд','Dashboard')}</h1><div class="vsub">${t('Всё по факту движений за 30 дней','Everything from actual 30-day cash flow')} · ${t('курс','FX')} ${fmt0(DB.settings.fx)} ${t('сум/$','UZS/$')}</div>

  <div class="bento">
    <div class="card hero">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div><span class="sl lbl">${t('Касса · все юр.лица','Cash · all entities')}</span><div class="big mono">${money(bal)}</div></div>
        <span class="hint" style="text-align:right">${t('прогноз при темпе 30 дней','projected at 30-day pace')}<br>net ${money(f.net)}/${t('мес','mo')}</span>
      </div>
      ${cashProjSVG(bal,f.net)}
    </div>
    <div class="bstack">
      ${stat(t('Доход · 30 дней','Income · 30d'),money(f.inn),srcArr.length?srcArr.length+t(' источ.',' sources'):t('нет поступлений','no inflows'),'pos')}
      ${stat(t('Расход · 30 дней','Spend · 30d'),money(f.out),t('ФОТ','payroll')+' '+money(f.pay),'neg')}
      ${stat('Runway',f.net>=0?'∞':(runway!==null?fmt1(runway)+t(' мес',' mo'):'0'),f.net>=0?t('доход покрывает расход','income covers spend'):(runway!==null?t('до ','until ')+addMonths(runway):'—'),f.net>=0?'pos':(runway!==null&&runway<6?'neg':''))}
    </div>
  </div>

  <div class="grid mini m5" style="margin-bottom:12px">
    ${stat('Net · 30'+t('д','d'),money(f.net),'',f.net>=0?'pos':'neg')}
    ${stat(t('Рост дохода','Income growth'),f.pInn>0?((f.inn-f.pInn)/f.pInn>=0?'+':'')+pct((f.inn-f.pInn)/f.pInn*100):(f.inn>0?'new':'—'),t('30д к пред. 30д','30d vs prior 30d'),f.pInn>0?(f.inn>=f.pInn?'pos':'neg'):'')}
    ${stat(t('Эффективность','Efficiency'),f.out>0?'$'+fmt1(f.inn/f.out):'—',t('дохода на $1 расхода','income per $1 spent'),f.out>0&&f.inn/f.out>=1?'pos':'')}
    ${stat(t('Доход / чел','Income / head'),heads?money(f.inn/heads):'—','30'+t('д','d')+' · '+heads+t(' чел',' ppl'))}
    ${stat(t('Расход / чел','Spend / head'),heads?money(f.out/heads):'—','30'+t('д','d'))}
  </div>
  <div class="grid mini m5" style="margin-bottom:12px">
    ${stat(t('ФОТ: факт / план','Payroll: fact / plan'),pMoPlan>0?pct(f.pay/pMoPlan*100):'—',money(f.pay)+' / '+money(pMoPlan),pMoPlan>0&&f.pay<pMoPlan*0.9?'neg':'')}
    ${stat(t('Касса / ФОТ','Cash / payroll'),pMoPlan>0?fmt1(bal/pMoPlan)+t(' мес',' mo'):'∞',t('зарплат в кассе','payrolls in cash'),pMoPlan>0&&bal/pMoPlan<3?'neg':'')}
    ${stat(t('Концентрация дохода','Income concentration'),srcArr.length?pct(conc):'—',srcArr.length?esc(srcArr[0][0]):'—',conc>60?'neg':'')}
    ${stat(t('Средний чек дохода','Avg income entry'),f.inCnt?money(f.inn/f.inCnt):'—',f.inCnt+t(' поступл. за 30д',' inflows in 30d'))}
    ${stat(t('Расходы в сумах','Spend in UZS'),f.out>0?pct(f.uzsOut/f.out*100):'—',t('валютный риск','FX exposure'),f.out>0&&f.uzsOut/f.out>0.7?'neg':'')}
  </div>
  <div class="grid mini m32" style="margin-bottom:12px">
    ${stat(t('Законтрактовано','Contracted'),money(contractSum||backlog),activeContracts.length+t(' активных контрактов',' active contracts')+(avgContract?' · '+t('средний','avg')+' '+money(avgContract):'')+' · '+t('бэклог проектов','projects backlog')+' '+money(backlog)+(projPct!==null?' ('+pct(projPct)+' '+t('выполнено','done')+')':''),'pos')}

    ${stat(t('Задачи','Tasks'),String(active),(overdue?overdue+t(' просрочено',' overdue')+' · ':'')+doneCnt+' done'+(urgCnt?' · '+urgCnt+t(' срочных',' urgent'):''),overdue?'neg':'')}
  </div>
    <div class="grid g3" style="margin-bottom:14px">
    ${stat(t('Регулярные обязательства','Recurring commitments'),money(costsMonthlyUSD())+' / '+t('мес','mo'),(()=>{const ym=ymNow();const done=DB.costs.filter(c=>c.lastPosted===ym).length;return ym+': '+t('проведено','posted')+' '+done+' / '+DB.costs.length+' · '+t('ФОТ план','payroll plan')+' '+money(payrollMo());})(),DB.costs.some(c=>c.lastPosted!==ymNow())&&new Date().getDate()>5?'neg':'')}
    ${stat(t('Нам должны','Owed to us'),money(debtsSum('in')),t('мы должны','we owe')+' '+money(debtsSum('out')),debtsSum('in')>0?'pos':'')}

function doPay(id){const p=DB.payroll.people.find(x=>x.id===id);if(!p)return;const g=k=>document.getElementById(k);
  const ym=g('pm-ym').value||ymNow();
  const wantOf=g('pm-of-on').checked,wantUn=g('pm-un-on').checked;

  if((!wantOf||amOf<=0)&&(!wantUn||amUn<=0)){toast(t('Нечего проводить','Nothing to post'));return;}
  p.paid=p.paid||{};const rec=p.paid[ym]=p.paid[ym]||{};

  const go=()=>{

function upcomingPayments(){
  const out=[];const now=new Date();now.setHours(0,0,0,0);
  const push=(day,label,usd)=>{if(!day||!(usd>0))return;let d=new Date(now.getFullYear(),now.getMonth(),day);if(d<now)d=new Date(now.getFullYear(),now.getMonth()+1,day);out.push({d,label,usd});};
  DB.costs.forEach(c=>push(c.dueDay,c.name,toUSD(c.amount||0,c.currency)));
  DB.payroll.people.forEach(p=>push(p.payDay,t('ЗП','Pay')+' · '+p.name,compUSD(p)));
  DB.debts.filter(d=>d.status!=='done'&&d.dir==='out'&&d.due).forEach(d=>{const dd=new Date(d.due);if(dd>=now)out.push({d:dd,label:d.who,usd:toUSD(d.amount,d.currency)});});
  return out.sort((a,b)=>a.d-b.d);}

const PSTAT={active:{ru:'Активен',en:'Active',c:'var(--green)'},paused:{ru:'Пауза',en:'Paused',c:'var(--amber)'},done:{ru:'Завершён',en:'Done',c:'var(--mid)'}};
const psL=k=>PSTAT[k]?t(PSTAT[k].ru,PSTAT[k].en):k;
function ordCollected(p){return (p.log||[]).reduce((s,l)=>s+(parseFloat(l.qty)||0),0);}
function ordStats(p){
  const collected=ordCollected(p),target=p.target||0;
  const progress=target>0?collected/target*100:0;
  const log=(p.log||[]).slice().sort((a,b)=>(a.date<b.date?-1:1));
  let perDay=0,eta=null;
  if(log.length&&collected>0){
    const d0=new Date(log[0].date),days=Math.max(1,Math.round((Date.now()-d0.getTime())/86400000)+1);
    perDay=collected/days;
    if(perDay>0&&collected<target){const rem=(target-collected)/perDay;const d=new Date();d.setDate(d.getDate()+Math.ceil(rem));eta=d.toISOString().slice(0,10);}
  }
  return {collected,target,progress,perDay,eta,earned:collected*(p.rate||0),value:target*(p.rate||0)};
}

function fileHost(scope,id){return scope==='task'?DB.tasks.find(x=>x.id===id):scope==='doc'?DB.docs.find(x=>x.id===id):DB.contracts.find(x=>x.id===id);}
function fileSaveKey(scope){return scope==='task'?'tasks':scope==='doc'?'docs':'contracts';}
async function attachFiles(scope,id,inputId){
  const inp=document.getElementById(inputId);if(!inp||!inp.files||!inp.files.length){toast(t('Выбери файл','Pick a file'));return;}
  const host=fileHost(scope,id);if(!host)return;
  if(!Array.isArray(host.files))host.files=[];
  toast(t('Загрузка…','Uploading…'));
  for(const f of Array.from(inp.files)){
    if(f.size>50*1024*1024){toast(t('Файл больше 50 МБ','File over 50 MB')+': '+f.name);continue;}
    const safe=f.name.replace(/[^\w.\-]+/g,'_');
    const path=scope+'/'+id+'/'+Date.now()+'_'+safe;
    try{const r=await sb.storage.from('docs').upload(path,f);if(r.error)throw r.error;host.files.push({name:f.name,path});}
    catch(e){toast(t('Не удалось загрузить','Upload failed')+': '+f.name+(e&&e.message?' · '+e.message:''));}
  }
  save(fileSaveKey(scope));toast(t('Готово','Done'));
  if(scope==='task')openTask(id);else if(scope==='doc')docModal(id);else contractModal(id);
}
async function openDoc(path){
  try{const r=await sb.storage.from('docs').createSignedUrl(path,3600);if(r.error)throw r.error;window.open(r.data.signedUrl,'_blank');}
  catch(e){toast(t('Не удалось открыть файл','Could not open file')+(e&&e.message?' · '+e.message:''));}
}
function delDoc(scope,id,idx){
  const host=fileHost(scope,id);if(!host||!Array.isArray(host.files)||!host.files[idx])return;
  const f=host.files[idx];
  confirmModal(t('Удалить файл','Delete file')+' «'+esc(f.name)+'»?',async()=>{
    try{await sb.storage.from('docs').remove([f.path]);}catch(e){}
    host.files.splice(idx,1);save(fileSaveKey(scope));
    if(scope==='task')openTask(id);else if(scope==='doc')docModal(id);else contractModal(id);
  });
}
function filesBlock(scope,id){
  const host=fileHost(scope,id);const fs=(host&&host.files)||[];

  ${fs.map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:3px 0"><a href="#" onclick="openDoc('${esc(f.path)}');return false" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">&#128206; ${esc(f.name)}</a><button class="ib danger" onclick="delDoc('${scope}','${id}',${i})" aria-label="delete">×</button></div>`).join('')}

function saveContract(id){const g=k=>document.getElementById(k);
  const data={name:g('k-name').value||t('Контракт','Contract'),party:g('k-party').value||'',entityId:g('k-ent').value,amount:parseFloat(g('k-amount').value)||0,currency:g('k-cur').value,date:g('k-date').value||'',status:g('k-status').value,url:g('k-url').value||'',notes:g('k-notes').value||''};
  if(id){const c=DB.contracts.find(x=>x.id===id);if(c)Object.assign(c,data);}
  else DB.contracts.unshift(Object.assign({id:uid('ct')},data));
  save('contracts');closeModal();render();}
function delContract(id){const c=DB.contracts.find(x=>x.id===id);confirmModal(t('Удалить контракт','Delete contract')+(c?` «${esc(c.name)}»`:'')+'?',()=>{DB.contracts=DB.contracts.filter(x=>x.id!==id);save('contracts');render();});}

/* ── legal structure ── */
function sanitizeSVG(s){s=String(s||'').trim();
  if(!/^<svg[\s>]/i.test(s))return '';
  s=s.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/<(foreignObject|iframe|embed|object)[\s\S]*?<\/\1>/gi,'')
     .replace(/\son\w+\s*=\s*"[^"]*"/gi,'').replace(/\son\w+\s*=\s*'[^']*'/gi,'')
     .replace(/(href|xlink:href)\s*=\s*["']\s*javascript:[^"']*["']/gi,'');
  return s;}
function rootEntities(){const ents=DB.settings.entities;let roots=ents.filter(e=>e.isRoot);if(!roots.length)roots=ents.filter(e=>/worldsense/i.test(e.name||''));if(!roots.length&&ents.length)roots=[ents[0]];return roots;}
function viewStructure(){
  const ents=DB.settings.entities;
  const roots=rootEntities();
  const kids=ents.filter(e=>!roots.includes(e));
  return `<div class="vhead"><div><h1 class="view">${t('Юридическая структура','Legal structure')}</h1><div class="vsub">${ents.length} ${t('юр.лиц','entities')} · ${t('холдинг сверху, предприятия ниже','holding on top, companies below')}</div></div><button class="btn pri" onclick="entityModal()">+ ${t('Юр. лицо','Entity')} <kbd>U</kbd></button></div>
  ${ents.length?`
  ${roots.length?`<div style="max-width:520px;margin:0 auto">${roots.map(e=>entityCard(e,true)).join('')}</div>
  ${kids.length?`<div style="width:2px;height:26px;background:var(--b2);margin:0 auto"></div><div style="height:2px;background:var(--b2);margin:0 auto;max-width:70%"></div><div style="display:flex;justify-content:center;gap:0;max-width:70%;margin:0 auto">${kids.map(()=>`<div style="flex:1;display:flex;justify-content:center"><div style="width:2px;height:22px;background:var(--b2)"></div></div>`).join('')}</div>`:''}`:''}
  ${kids.length?`<div class="grid g2" style="margin-top:0">${kids.map(e=>entityCard(e,false)).join('')}</div>`:''}`
  :`<div class="empty"><b>${t('Юр.лиц нет','No entities')}</b>${t('Добавь первое (U) — оно появится во всех выпадающих списках','Add the first one (U) — it appears in every dropdown')}</div>`}
  `;
}

  </div>

  <div class="row"><span class="muted">${t('Стартовый баланс ($)','Opening balance ($)')}</span><input class="mono" style="width:120px" type="number" value="${e.opening||0}" onchange="setOpening('${e.id}',this.value)"></div>

  ${tot>0?`<div class="prog" style="margin:4px 0 10px"><div style="width:${Math.min(100,tot)}%;background:${tot>100?'var(--red)':'var(--cyan)'}"></div></div>`:''}
  <div class="shrow"><input id="sh-n-${e.id}" placeholder="${t('Имя акционера','Shareholder name')}"><input id="sh-p-${e.id}" class="mono" type="number" step="0.1" placeholder="%"><button class="ib" onclick="shAdd('${e.id}')" aria-label="add">＋</button></div>
  </div>`;
}
let _pendingLogo=null; /* null=не менять, ''=убрать, строка=новый */
function pickLogo(inp){const f=inp.files&&inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{const clean=sanitizeSVG(r.result);
    if(!clean){toast(t('Файл не похож на SVG','Not a valid SVG file'));inp.value='';return;}
    _pendingLogo=clean;
    const pv=document.getElementById('e-logo-preview');if(pv){pv.innerHTML=clean;pv.style.display='flex';}
    const rm=document.getElementById('e-logo-rm');if(rm)rm.style.display='';};
  r.readAsText(f);}
function removeLogo(){_pendingLogo='';const pv=document.getElementById('e-logo-preview');if(pv){pv.innerHTML='';pv.style.display='none';}const rm=document.getElementById('e-logo-rm');if(rm)rm.style.display='none';const f=document.getElementById('e-logo-file');if(f)f.value='';}

function saveEntity(id){const g=k=>document.getElementById(k);
  const prev=id?((DB.settings.entities.find(x=>x.id===id)||{}).logo||''):'';
  const logo=_pendingLogo===null?prev:_pendingLogo;
  const data={name:g('e-name').value||t('Лицо','Entity'),type:g('e-type').value||'',country:g('e-country').value||'',site:g('e-site').value||'',desc:g('e-desc').value||'',logo,status:g('e-status').value,kind:g('e-kind').value,opening:parseFloat(g('e-open').value)||0,isRoot:g('e-root').value==='1'};
  if(id){const e=DB.settings.entities.find(x=>x.id===id);if(e)Object.assign(e,data);}
  else DB.settings.entities.push(Object.assign({id:uid('ent'),shareholders:[]},data));
  save('settings');closeModal();render();}
function delEntity(id){const e=DB.settings.entities.find(x=>x.id===id);confirmModal(t('Удалить юр. лицо','Delete entity')+(e?` «${esc(e.name)}»`:'')+'? '+t('Записи, привязанные к нему, останутся без юр.лица.','Records linked to it will lose their entity.'),()=>{DB.settings.entities=DB.settings.entities.filter(x=>x.id!==id);save('settings');render();});}
function setOpening(id,v){const e=DB.settings.entities.find(x=>x.id===id);if(e){e.opening=parseFloat(v)||0;save('settings');render();}}
function shAdd(eid){const e=DB.settings.entities.find(x=>x.id===eid);if(!e)return;const n=document.getElementById('sh-n-'+eid),p=document.getElementById('sh-p-'+eid);const name=(n.value||'').trim();if(!name)return;e.shareholders=e.shareholders||[];e.shareholders.push({id:uid('sh'),name,pct:parseFloat(p.value)||0});save('settings');render();}
function shSet(eid,sid,field,v){const e=DB.settings.entities.find(x=>x.id===eid);if(!e)return;const s=(e.shareholders||[]).find(x=>x.id===sid);if(!s)return;s[field]=field==='pct'?(parseFloat(v)||0):v;save('settings');if(field==='pct')render();}
function shDel(eid,sid){const e=DB.settings.entities.find(x=>x.id===eid);if(!e)return;e.shareholders=(e.shareholders||[]).filter(x=>x.id!==sid);save('settings');render();}
function saveFx(v){DB.settings.fx=parseFloat(v)||1;save('settings');render();toast(t('Курс обновлён','FX updated'));}
function saveFxEur(v){DB.settings.fxEur=parseFloat(v)||1.08;save('settings');render();toast(t('Курс обновлён','FX updated'));}
function exportData(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='worldsense-os-'+today()+'.json';a.click();toast(t('Экспортировано','Exported'));}
function importPrompt(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);['settings','costs','income','tasks','payroll','tx','contracts','orders','debts','docs','invoices'].forEach(k=>{if(d[k])DB[k]=d[k];});['settings','costs','income','tasks','payroll','tx','contracts','orders','debts','docs','invoices'].forEach(save);render();toast(t('Импортировано','Imported'));}catch(e){toast(t('Ошибка файла','File error'));}};r.readAsText(f);};inp.click();}

const SHORTCUTS=[
  ['1',['Дашборд','Dashboard']],['2',['Финансы','Finance']],['3',['Задачи','Tasks']],['4',['Команда','Team']],['5',['Структура','Structure']],['6',['Проекты','Projects']],['7',['Контракты','Contracts']],
  ['N',['Новое на текущем экране','New item on current screen']],
  ['T',['Движение по кассе (доход/расход)','Cash entry (income/spend)']],
  ['P',['Новый человек','New person']],['C',['Новый контракт','New contract']],['U',['Новое юр. лицо','New entity']],['O',['Новый проект','New project']],
  ['Q',['Быстрая задача (фокус в поле)','Quick task (focus input)']],
  ['?',['Эта шпаргалка','This cheatsheet']],['Esc',['Закрыть окно','Close dialog']],
];
function helpModal(){
  modal(`<h3>${t('Горячие клавиши','Keyboard shortcuts')}</h3>
  ${SHORTCUTS.map(([k,l])=>`<div class="kbrow"><span>${t(l[0],l[1])}</span><span class="keys"><kbd>${k}</kbd></span></div>`).join('')}
  <div class="actions" style="margin-top:14px"><button class="btn pri" onclick="closeModal()">OK</button></div>`);
}
function contextNew(){
  if(view==='tasks'){const q=document.getElementById('qa-input');if(q){q.focus();return;}taskModal();}
  else if(view==='team')personModal();
  else if(view==='docs')docModal();
  else if(view==='fin')newTx();
  else if(view==='projects')projectModal();
  else if(view==='contracts')contractModal();
  else if(view==='structure')entityModal();
  else newTx();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeDrawer();document.getElementById('acct').classList.remove('open');document.getElementById('gearc').classList.remove('open');return;}
  if(!DB.settings||!sbProfile)return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const tgt=e.target;
  if(tgt&&(tgt.tagName==='INPUT'||tgt.tagName==='TEXTAREA'||tgt.tagName==='SELECT'||tgt.isContentEditable))return;
  if(document.querySelector('.modal-bg'))return;
  const code=e.code;
  const secs=tabsFor().map(x=>x[0]);
  if(/^Digit[1-8]$/.test(code)){const i=parseInt(code.slice(5),10)-1;if(secs[i])go(secs[i]);e.preventDefault();return;}
  if(code==='KeyN'){contextNew();e.preventDefault();}
  else if(code==='KeyT'){newTx();e.preventDefault();}
  else if(code==='KeyP'){personModal();e.preventDefault();}
  else if(code==='KeyC'){contractModal();e.preventDefault();}
  else if(code==='KeyD'){docModal();e.preventDefault();}
  else if(code==='KeyU'){entityModal();e.preventDefault();}
  else if(code==='KeyO'){projectModal();e.preventDefault();}
  else if(code==='KeyQ'){view='tasks';render();const q=document.getElementById('qa-input');if(q)q.focus();e.preventDefault();}
  else if(code==='Slash'||code==='F1'){helpModal();e.preventDefault();}
});

function modal(h){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${h}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
let _confirmCb=null;
function confirmModal(msg,onYes,danger){_confirmCb=onYes;modal(`<h3 style="margin-top:0">${msg}</h3><div class="actions"><button class="btn" onclick="closeModal()">${t('Отмена','Cancel')}</button><button class="btn ${danger===false?'pri':'danger'}" onclick="confirmYes()">${t('Да','Yes')}</button></div>`);}

  const logo=(document.querySelector('#side .logofull svg')||{}).outerHTML||'worldsense';
  root.innerHTML=`<div class="loginbox"><div class="wordmark" style="display:flex;justify-content:center">${logo}</div><div class="sub">${t('Вход через Supabase · первый аккаунт становится владельцем','Supabase sign-in · first account becomes owner')}</div>
  <div class="fs"><label>Email</label><input id="sb-email" type="email" autocomplete="username" inputmode="email"></div>
  <div class="fs"><label>${t('Пароль','Password')}</label><input id="sb-pass" type="password" autocomplete="current-password"></div>
  <button class="btn pri" style="width:100%" onclick="sbSignIn()">${t('Войти','Sign in')}</button>
  <div style="display:flex;gap:8px;margin-top:8px"><button class="btn" style="flex:1" onclick="sbSignUp()">${t('Создать аккаунт','Sign up')}</button><button class="btn" style="flex:1" onclick="sbMagicLink()">${t('Ссылка на почту','Magic link')}</button></div>
  <div class="lg-err" id="lg-err"></div></div>`;
  setTimeout(()=>{const e=document.getElementById('sb-email');if(e){e.onkeydown=ev=>{if(ev.key==='Enter')sbSignIn();};try{e.focus();}catch(_){}}const p=document.getElementById('sb-pass');if(p)p.onkeydown=ev=>{if(ev.key==='Enter')sbSignIn();};},40);
}
function hideLogin(){const root=document.getElementById('login-root');root.style.display='none';root.innerHTML='';}
async function sbSignIn(){const email=(document.getElementById('sb-email')||{}).value||'';const pass=(document.getElementById('sb-pass')||{}).value||'';const err=document.getElementById('lg-err');try{const r=await sb.auth.signInWithPassword({email,password:pass});if(r.error)throw r.error;await afterLogin();}catch(e){if(err)err.textContent=t('Не удалось войти','Sign-in failed')+': '+(e.message||'');}}
async function sbSignUp(){const email=(document.getElementById('sb-email')||{}).value||'';const pass=(document.getElementById('sb-pass')||{}).value||'';const err=document.getElementById('lg-err');try{const r=await sb.auth.signUp({email,password:pass});if(r.error)throw r.error;if(err)err.textContent=t('Аккаунт создан. Подтверди почту (если включено) и войди.','Account created. Confirm email if required, then sign in.');}catch(e){if(err)err.textContent=e.message||'';}}
async function sbMagicLink(){const email=(document.getElementById('sb-email')||{}).value||'';const err=document.getElementById('lg-err');try{const r=await sb.auth.signInWithOtp({email});if(r.error)throw r.error;if(err)err.textContent=t('Ссылка для входа отправлена на почту','Magic link sent to your email');}catch(e){if(err)err.textContent=e.message||'';}}
async function logout(){try{await sb.auth.signOut();}catch(e){}sbProfile=null;document.getElementById('acct').classList.remove('open');showLogin();}
async function afterLogin(){
  let session=null;try{const r=await sb.auth.getSession();session=r.data&&r.data.session;}catch(e){}
  if(!session){showLogin();return;}
  let prof=null;try{const r=await sb.from('profiles').select('*').eq('id',session.user.id).maybeSingle();prof=r.data;}catch(e){}
  sbProfile=prof||{name:session.user.email};
  if(!sbProfile.email)sbProfile.email=session.user.email;
  await loadAll();
  view='dash';
  hideLogin();render();
  toast(t('Вход выполнен','Signed in')+' · '+(sbProfile.name||session.user.email||''));
}
async function boot(){
  try{await loadSupabase();}catch(e){document.getElementById('app').innerHTML=`<div class="empty" style="margin-top:60px"><b>${t('Нет соединения','No connection')}</b>${t('Не удалось загрузить Supabase SDK. Проверь интернет и обнови страницу.','Could not load the Supabase SDK. Check your connection and reload.')}</div>`;return;}
  sb=window.supabase.createClient(SB_URL,SB_ANON);
  let sess=null;try{const r=await sb.auth.getSession();sess=r.data&&r.data.session;}catch(e){}
  if(sess)await afterLogin();else showLogin();
}
boot();
/* PWA: service worker (работает только на https-хостинге, не с file://) */
if('serviceWorker' in navigator&&location.protocol.startsWith('http')){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
