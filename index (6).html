<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldSense OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000;--s1:#0A0A0A;--s2:#111;--s3:#161616;--s4:#1C1C1C;
    --b1:#1E1E1E;--b2:#2A2A2A;--b3:#383838;
    --w:#FFF;--hi:#F0F0F0;--mid:#888;--dim:#555;--ghost:#333;
    --red:#FF453A;--amber:#FFD60A;--green:#30D158;--blue:#0A84FF;--purple:#BF5AF2;--orange:#FF9F0A;--cyan:#64D2FF;
    --sans:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--w);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:var(--sans);background:var(--s2);border:1px solid var(--b2);color:var(--w);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--blue);}
  input.mono{font-family:var(--mono);text-align:right;}
  ::placeholder{color:var(--dim);}
  a{color:var(--blue);text-decoration:none;}
  .lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--dim);}
  .mono{font-family:var(--mono);} .pos{color:var(--green);} .neg{color:var(--red);} .muted{color:var(--mid);}

  #topbar{position:sticky;top:0;z-index:50;background:var(--bg);}
  #top{background:var(--bg);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:9px 18px;min-height:58px;gap:12px;flex-wrap:wrap;}
  #top .brand{display:flex;align-items:center;gap:11px;min-width:0;}
  #top .brand svg{height:26px;width:auto;display:block;}
  #top .brand svg path{fill:#fff;}
  #top .osbadge{font-family:var(--mono);font-size:9px;letter-spacing:0.18em;color:var(--mid);border:1px solid var(--b2);border-radius:6px;padding:3px 6px;}
  #top .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
  .roleview{display:flex;align-items:center;gap:6px;}
  .roleview .lbl{color:var(--ghost);}
  .roleview select{width:auto;font-family:var(--mono);font-size:10px;padding:6px 8px;background:var(--s3);border-color:var(--b2);}
  .seg{display:inline-flex;border:1px solid var(--b2);border-radius:8px;overflow:hidden;}
  .seg button{font-family:var(--mono);font-size:10px;padding:6px 10px;color:var(--dim);}
  .seg button.on{background:var(--s3);color:var(--w);}

  nav{display:flex;gap:4px;flex-wrap:wrap;padding:10px 18px;border-bottom:1px solid var(--b1);background:var(--bg);}
  .nbtn{font-family:var(--mono);font-size:11px;letter-spacing:0.04em;color:var(--dim);padding:7px 12px;border-radius:8px;border:1px solid transparent;}
  .nbtn:hover{color:var(--mid);} .nbtn.active{color:var(--w);background:var(--s2);border-color:var(--b2);}

  main{max-width:1180px;margin:0 auto;padding:22px 18px 90px;}
  h1.view{font-size:22px;font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;}
  .vsub{color:var(--mid);font-size:13px;margin-bottom:20px;}
  .grid{display:grid;gap:14px;}
  .g4{grid-template-columns:repeat(auto-fit,minmax(155px,1fr));}
  .g3{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));}
  .g2{grid-template-columns:repeat(auto-fit,minmax(290px,1fr));}
  .card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;}
  .card h2{font-size:13px;font-weight:600;margin-bottom:12px;}
  .stat .sl{font-family:var(--mono);font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:8px;}
  .stat .sv{font-family:var(--mono);font-size:25px;font-weight:600;letter-spacing:-0.03em;line-height:1;}
  .stat .sn{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:5px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1);}
  .row:last-child{border-bottom:none;} .row .n{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:0.06em;padding:9px 14px;border-radius:9px;border:1px solid var(--b2);background:var(--s2);color:var(--w);}
  .btn:hover{border-color:var(--b3);background:var(--s3);}
  .btn.pri{background:var(--blue);border-color:var(--blue);color:#fff;} .btn.pri:hover{filter:brightness(1.1);}
  .btn.sm{padding:6px 10px;font-size:10px;} .btn.danger{color:var(--red);border-color:#3a1d1d;}
  .btn.pay{color:var(--green);border-color:#1c3a24;} .btn.pay:hover{background:#0e1f14;}
  .tag{font-family:var(--mono);font-size:9px;letter-spacing:0.04em;padding:3px 7px;border-radius:6px;border:1px solid var(--b2);color:var(--mid);white-space:nowrap;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:20px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  td,th{padding:9px 8px;text-align:left;border-bottom:1px solid var(--b1);}
  th{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);font-weight:400;}
  td.n,th.n{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;}
  tr.tot td{border-top:1px solid var(--b3);border-bottom:none;font-weight:600;padding-top:11px;}

  .fgroup{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--mid);margin:18px 0 4px;padding-bottom:6px;border-bottom:1px solid var(--b1);}
  .fgroup:first-of-type{margin-top:4px;}
  .formula{font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--mid);background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:9px 11px;margin-bottom:6px;}
  .field{display:grid;grid-template-columns:1fr 180px;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--b1);}
  .field:last-child{border-bottom:none;} .field label{font-size:13px;}
  .field small{display:block;color:var(--dim);font-size:11px;margin-top:1px;}
  .inwrap{display:flex;align-items:center;gap:8px;}
  .inwrap input{flex:1;min-width:0;}
  .unit{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;min-width:30px;}
  .pctrow{display:flex;align-items:center;gap:10px;}
  .pctrow input[type=range]{flex:1;}
  .pctval{font-family:var(--mono);font-size:12px;min-width:40px;text-align:right;color:var(--w);}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--b2);border:none;border-radius:2px;padding:0;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;border:none;}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--blue);cursor:pointer;border:none;}

  .prog{height:8px;border-radius:5px;background:var(--s3);overflow:hidden;border:1px solid var(--b1);} .prog div{height:100%;background:var(--cyan);}
  .pill{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;letter-spacing:0.04em;}
  .empty{text-align:center;color:var(--dim);padding:36px 16px;font-size:13px;border:1px dashed var(--b2);border-radius:12px;}
  .empty b{color:var(--mid);display:block;margin-bottom:6px;font-weight:500;}
  .lock{text-align:center;color:var(--dim);padding:48px 20px;border:1px dashed var(--b2);border-radius:14px;} .lock b{color:var(--mid);display:block;margin-bottom:6px;font-weight:500;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-start;justify-content:center;padding:54px 16px;z-index:100;overflow:auto;}
  .modal{background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:20px;width:100%;max-width:520px;}
  .modal h3{font-size:15px;font-weight:600;margin-bottom:14px;}
  .modal .field-stack{display:grid;gap:12px;margin-bottom:16px;}
  .modal .fs label{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:5px;}
  .modal .actions{display:flex;gap:8px;justify-content:flex-end;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s4);border:1px solid var(--b3);color:var(--hi);font-family:var(--mono);font-size:11px;padding:10px 16px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;} #toast.on{opacity:1;}
  .hint{font-size:11px;color:var(--dim);}
  .split{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start;}
  @media(max-width:780px){.split{grid-template-columns:1fr;}.field{grid-template-columns:1fr 140px;}}
  .backlink{font-family:var(--mono);font-size:11px;color:var(--mid);margin-bottom:14px;display:inline-flex;gap:6px;align-items:center;cursor:pointer;} .backlink:hover{color:var(--w);}
  .lineitem{display:grid;grid-template-columns:1fr 110px 70px 30px;gap:8px;align-items:center;margin-bottom:8px;}
  .memberchip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--b2);border-radius:20px;font-size:12px;cursor:pointer;margin:0 6px 6px 0;}
  .memberchip.on{border-color:var(--cyan);color:var(--cyan);}
  .frow{display:grid;grid-template-columns:1fr 120px 30px;gap:8px;align-items:center;margin-bottom:8px;}
  .fxrow{display:grid;grid-template-columns:1fr 30px;gap:8px;margin-bottom:10px;align-items:start;}
  .fxrow .fxmain{display:grid;gap:6px;}
  .fxhead{display:grid;grid-template-columns:1fr 92px;gap:6px;}
  .fxexpr{display:flex;align-items:center;gap:8px;}
  .fxexpr input{flex:1;font-family:var(--mono);}
  .fxres{font-family:var(--mono);font-size:12px;color:var(--cyan);min-width:64px;text-align:right;white-space:nowrap;}
  .opbar{display:flex;gap:5px;flex-wrap:wrap;margin:4px 0 10px;}
  .opbar button{font-family:var(--mono);font-size:13px;width:30px;height:28px;border:1px solid var(--b2);border-radius:7px;background:var(--s2);color:var(--mid);}
  .opbar button:hover{color:var(--w);border-color:var(--b3);}
  .vchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .vchip{font-family:var(--mono);font-size:10px;padding:4px 9px;border-radius:20px;border:1px solid var(--b2);color:var(--cyan);cursor:pointer;}
  .vchip:hover{background:var(--s3);}
  .sheet{border:1px solid var(--b1);border-radius:10px;overflow:hidden;}
  .shead{display:grid;grid-template-columns:20px 1fr 1.3fr 56px 38px 96px;gap:8px;padding:8px 10px;background:var(--s2);font-family:var(--mono);font-size:9px;letter-spacing:0.07em;text-transform:uppercase;color:var(--dim);}
  .shead .r{text-align:right;}
  .srow{display:grid;grid-template-columns:20px 1fr 1.3fr 56px 38px 96px;gap:8px;align-items:center;padding:6px 10px;border-top:1px solid var(--b1);}
  .srow.drop{border-top:2px solid var(--blue);}
  .dragh{cursor:grab;color:var(--ghost);font-size:13px;text-align:center;user-select:none;}
  .dragh:hover{color:var(--mid);}
  .racts{display:flex;gap:2px;justify-content:flex-end;}
  .ib{width:21px;height:24px;border:1px solid var(--b2);border-radius:6px;background:var(--s2);color:var(--mid);font-size:12px;line-height:1;padding:0;}
  .ib:hover{color:var(--w);border-color:var(--b3);}
  .ib.danger{color:var(--red);}
  .srow input{padding:6px 8px;}
  .srow .fxres{text-align:right;}
  .kindsel{padding:6px 2px;text-align:center;}
  @media(max-width:780px){.shead,.srow{grid-template-columns:16px 1fr 1.1fr 48px 34px 84px;gap:5px;}}
  .fxhelp{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:10px;line-height:1.6;}
  .comment{padding:10px 0;border-bottom:1px solid var(--b1);}
  .comment:last-child{border-bottom:none;}
  .comment .meta{font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:4px;}
  .comment .meta b{color:var(--mid);font-weight:500;}
  .clickrow{cursor:pointer;}
  .clickrow:hover .ttitle{color:var(--cyan);}
  textarea{min-height:70px;resize:vertical;}
  .overdue{color:var(--red);border-color:#3a1d1d;}
  .cbadge{font-family:var(--mono);font-size:9px;color:var(--dim);}
  .ministat{padding:3px 6px;font-size:11px;border:1px solid var(--b2);border-radius:6px;background:var(--s1);}
  .amber{color:var(--amber);}
  .tpick{display:grid;grid-template-columns:repeat(auto-fit,minmax(186px,1fr));gap:10px;margin-bottom:18px;}
  table.pnl{width:100%}table.pnl td{padding:7px 0}table.pnl tr.sub td{border-top:1px solid var(--b1);font-weight:600}table.pnl tr.tot td{border-top:2px solid var(--b2);font-weight:700;font-size:15px}
  .msel{padding:6px 10px;border:1px solid var(--b2);border-radius:8px;background:var(--s1);color:var(--w);font-size:13px}
  .ecard{border:1px solid var(--b1);border-radius:12px;padding:14px;background:var(--s1)}
  .tile{border:1px solid var(--b2);background:var(--s1);border-radius:12px;padding:13px;cursor:pointer;transition:border-color .15s,background .15s;}
  .tile:hover{border-color:var(--b3);}
  .tile.on{border-color:var(--blue);background:var(--s2);}
  .tile .tt{font-weight:600;font-size:13px;margin-bottom:5px;}
  .tile .td{font-size:11px;color:var(--mid);line-height:1.45;}
  /* ── mobile ── */
  @media(max-width:680px){
    #top{padding:8px 12px;min-height:50px;gap:8px;}
    #top .brand svg{height:21px;} #top .osbadge{display:none;}
    #top .right{gap:6px;} .roleview .lbl{display:none;}
    .roleview select{font-size:11px;padding:6px 7px;}
    nav{flex-wrap:nowrap;overflow-x:auto;padding:8px 12px;gap:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    nav::-webkit-scrollbar{display:none;}
    .nbtn{flex:0 0 auto;padding:9px 13px;font-size:12px;min-height:38px;}
    main{padding:16px 12px 96px;}
    h1.view{font-size:19px;} .vsub{margin-bottom:14px;}
    .card{padding:13px;overflow-x:auto;} .card>table,.card .pnl{min-width:max-content;}
    input,select,textarea{font-size:16px;}
    .stat .sv{font-size:21px;} .stat .sl{font-size:7px;}
    .g4{grid-template-columns:repeat(auto-fit,minmax(135px,1fr));}
    .btn{min-height:40px;padding:10px 14px;} .btn.sm{min-height:34px;}
    .modal{max-width:94vw;}
    .split{grid-template-columns:1fr;}
    table th,table td{padding:8px 8px;}
  }
  @media(max-width:380px){ .g4{grid-template-columns:1fr 1fr;} }
  .who{font-family:var(--mono);font-size:10px;color:var(--mid);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #login-root{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;}
  .loginbox{width:100%;max-width:360px;}
  .loginbox .lg-brand{display:flex;justify-content:center;margin-bottom:8px;}
  .loginbox .lg-brand svg{height:30px;}
  .loginbox h2{font-size:16px;text-align:center;margin:14px 0 4px;}
  .loginbox .sub{color:var(--mid);font-size:12px;text-align:center;margin-bottom:18px;}
  .loginbox .fs{margin-bottom:12px;} .loginbox label{display:block;font-size:11px;color:var(--mid);margin-bottom:5px;}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
  .pinpad button{border:1px solid var(--b2);border-radius:10px;padding:14px;font-family:var(--mono);font-size:18px;background:var(--s2);min-height:48px;}
  .pinpad button:active{background:var(--s3);}
  .lg-err{color:var(--red);font-size:12px;text-align:center;min-height:16px;margin-top:8px;}
</style>
</head>

function entityBalance(id){let b=(DB.settings.entities.find(e=>e.id===id)||{}).opening||0;DB.tx.forEach(x=>{if(x.entityId===id){const u=toUSD(x.amount,x.currency);b+=(x.kind==='in'?u:-u);}});return b;}
function totalBalance(){return DB.settings.entities.reduce((s,e)=>s+entityBalance(e.id),0);}
function entityPnl(){const def=DB.settings.entities[0]?DB.settings.entities[0].id:'';return DB.settings.entities.map(e=>{
  let rev=0,prof=0,collProfit=0;
  DB.projects.forEach(p=>{if(p.entityId!==e.id)return;const c=calcProject(p);if(p.type==='collection'){if(p.stage!=='closed'&&p.stage!=='lost')collProfit+=c.profit;}else if(p.stage==='active'){rev+=c.monthlyRevenue;prof+=c.monthlyProfit;}});
  let pay=0;DB.payroll.people.forEach(pp=>{if((pp.entityId||def)===e.id)pay+=toUSD(pp.salary,pp.currency);});
  let cost=0;DB.costs.forEach(c=>{if((c.entityId||def)===e.id&&c.recurring)cost+=toUSD(c.amount,c.currency);});
  const burn=pay+cost,net=prof-burn;
  return {e,rev,prof,pay,cost,burn,net,collProfit,bal:entityBalance(e.id)};
});}
function pnl(period,entId){const def=DB.settings.entities[0]?DB.settings.entities[0].id:'';const mult=period==='yr'?12:1;
  let rev=0,cogs=0,collRev=0,collProfit=0;
  DB.projects.forEach(p=>{const inEnt=entId==='all'||p.entityId===entId;if(!inEnt)return;const c=calcProject(p);
    if(p.type==='collection'){if(p.stage!=='closed'&&p.stage!=='lost'){collRev+=c.revenue;collProfit+=c.profit;}}
    else if(p.stage==='active'){rev+=c.monthlyRevenue;cogs+=(c.monthlyRevenue-c.monthlyProfit);}});
  let payroll=0;DB.payroll.people.forEach(pp=>{if(entId==='all'||(pp.entityId||def)===entId)payroll+=toUSD(pp.salary,pp.currency);});
  let opex=0;DB.costs.forEach(c=>{if(!c.recurring)return;if(entId==='all'||(c.entityId||def)===entId)opex+=toUSD(c.amount,c.currency);});
  rev*=mult;cogs*=mult;payroll*=mult;opex*=mult;
  const gross=rev-cogs,ebit=gross-payroll-opex;
  return {rev,cogs,gross,grossM:rev>0?gross/rev*100:0,payroll,opex,ebit,ebitM:rev>0?ebit/rev*100:0,collRev,collProfit,hasColl:collRev>0};}
function costsByCat(entId){const def=DB.settings.entities[0]?DB.settings.entities[0].id:'';const map={};DB.costs.forEach(c=>{if(!c.recurring)return;if(entId!=='all'&&(c.entityId||def)!==entId)return;const k=c.category||t('Прочее','Other');map[k]=(map[k]||0)+toUSD(c.amount,c.currency);});return Object.entries(map).map(([cat,amt])=>({cat,amt})).sort((a,b)=>b.amt-a.amt);}
function pnlWaterfall(P){const R1=P.rev,R2=P.rev-P.cogs,R3=R2-P.payroll,R4=R3-P.opex;
  const cols=[{l:t('Выручка','Revenue'),a:0,b:R1,c:'var(--green)'},{l:'− COGS',a:R1,b:R2,c:'var(--red)'},{l:t('− ФОТ','− Payroll'),a:R2,b:R3,c:'var(--red)'},{l:t('− OpEx','− OpEx'),a:R3,b:R4,c:'var(--red)'},{l:'EBIT',a:0,b:R4,c:R4>=0?'var(--blue)':'var(--red)'}];
  const vals=[0,R1,R2,R3,R4];const maxL=Math.max(...vals),minL=Math.min(...vals,0);const W=560,H=230,pl=8,pr=8,pt=24,pb=46;const span=(maxL-minL)||1;const y=v=>pt+(1-(v-minL)/span)*(H-pt-pb);const n=cols.length,gap=14,cw=(W-pl-pr-gap*(n-1))/n;const zeroY=y(0).toFixed(1);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block"><line x1="${pl}" y1="${zeroY}" x2="${W-pr}" y2="${zeroY}" stroke="var(--b2)"/>${cols.map((c,i)=>{const x=pl+i*(cw+gap);const top=Math.max(c.a,c.b),bot=Math.min(c.a,c.b);const yt=y(top),yb=y(bot);const h=Math.max(2,yb-yt);const val=c.b-c.a;const lblY=(c.b>=c.a)?yt-4:yb+12;return `<rect x="${x.toFixed(1)}" y="${yt.toFixed(1)}" width="${cw.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${c.c}" opacity="0.9"/><text x="${(x+cw/2).toFixed(1)}" y="${lblY.toFixed(1)}" text-anchor="middle" fill="#fff" style="font:10px var(--mono)">${money((i===0||i===4)?c.b:val)}</text><text x="${(x+cw/2).toFixed(1)}" y="${H-26}" text-anchor="middle" fill="var(--mid)" style="font:10px Inter">${c.l}</text>`;}).join('')}</svg>`;}

function calcRig(m){
  const span=Math.max(1,m.span||1),util=(m.util||0)/100,amort=Math.max(1,m.amort||1);
  const sups=Math.ceil((m.workers||0)/span),people=(m.workers||0)+sups,sqm=people*(m.sqmpp||0);
  const revenue=(m.workers||0)*(m.hours||0)*(m.days||0)*(m.rate||0)*util;
  const salaries=(m.workers||0)*(m.salary||0),supSal=sups*(m.supsal||0),payTax=(salaries+supSal)*((m.tax||0)/100);
  const rentCost=sqm*(m.rent||0),equipCost=people*(m.equip||0)/amort;
  const costs=salaries+supSal+payTax+rentCost+equipCost+(m.misc||0);
  const profit=revenue-costs,margin=revenue>0?profit/revenue*100:0;
  const fullRev=(m.workers||0)*(m.hours||0)*(m.days||0)*(m.rate||0),be=fullRev>0?costs/fullRev*100:0;
  const billed=(m.workers||0)*(m.hours||0)*(m.days||0)*util;
  return {revenue,costs,profit,margin,monthlyRevenue:revenue,monthlyProfit:profit,capex:people*(m.equip||0),breakeven:be,sups,people,sqm,
    refs:[[t('Прибыль на аннотатора','Profit per annotator'),money((m.workers||0)>0?profit/(m.workers||0):0)+t(' / мес',' / mo')],[t('Себестоимость часа','Cost per hour'),money(billed>0?costs/billed:0)],[t('Точка безубыточности','Break-even'),pct(be)+t(' загрузки',' util')],[t('Разовый капекс','One-time capex'),money(people*(m.equip||0))],[t('Прибыль за год','Profit per year'),money(profit*12)]],

function calcDatacol(m){
  const days=m.days||0,hpd=m.hpd||0,people=m.people||0,salary=m.salary||0,sets=m.sets||0,capexPer=m.capexPer||0,amort=Math.max(1,m.amort||1),clientRate=m.clientRate||0,misc=m.misc||0,target=m.target||0;
  const capMonth=people*hpd*days,months=capMonth>0?target/capMonth:0;
  const revenue=target*clientRate,laborMo=people*salary,capex=sets*capexPer;
  const totalCost=(laborMo+misc)*months+capex,profit=revenue-totalCost;
  const costPerHour=target>0?totalCost/target:0,beRate=costPerHour,margin=revenue>0?profit/revenue*100:0;
  const monthlyRevenue=months>0?revenue/months:revenue,monthlyProfit=months>0?profit/months:profit;
  const opMonthly=(months>0?revenue/months:0)-laborMo-misc,payback=opMonthly>0?capex/opMonthly:null;
  return {revenue,costs:totalCost,profit,margin,monthlyRevenue,monthlyProfit,months,costPerHour,capex,capMonth,beRate,payback,
    refs:[[t('Срок сбора','Time to collect'),(months?fmt1(months):'∞')+' '+t('мес','mo')],[t('Пропускная способность','Throughput'),fmt0(capMonth)+' '+t('ч/мес','h/mo')],[t('Себестоимость часа','Cost per hour'),money(costPerHour)],[t('Ставка безубыточности','Break-even rate'),money(beRate)+'/'+t('час','hr')],[t('Окупаемость CAPEX','CAPEX payback'),payback?fmt1(payback)+' '+t('мес','mo'):'—'],[t('CAPEX','CAPEX'),money(capex)]],
    breakdown:[[t('ЗП за период','Labor (period)'),laborMo*months],[t('CAPEX','CAPEX'),capex],[t('Прочее за период','Other (period)'),misc*months]]};
}

function rollup(){
  let mRev=0,mProfit=0,pipe=0,active=0,prospect=0;const collections=[];
  DB.projects.forEach(p=>{const r=calcProject(p),st=STAGES[p.stage]||{prob:0};if(p.type==='collection'){if(p.stage!=='closed'&&p.stage!=='lost')collections.push({p,c:r});return;}if(p.stage==='active'){mRev+=r.monthlyRevenue;mProfit+=r.monthlyProfit;active++;}if(['lead','negotiation','pilot'].includes(p.stage)){pipe+=r.monthlyRevenue*st.prob;prospect++;}});
  let costMo=0;DB.costs.forEach(c=>{if(c.recurring)costMo+=toUSD(c.amount,c.currency);});
  let payMo=0;DB.payroll.people.forEach(p=>{payMo+=toUSD(p.salary,p.currency);});
  const burn=costMo+payMo,netMo=mProfit-burn,bal=totalBalance(),drain=burn-mProfit,runway=drain>0?bal/drain:null;
  return {mRev,mProfit,pipe,active,prospect,burn,netMo,bal,runway,collections};
}
const PAL=['#0A84FF','#30D158','#FF9F0A','#BF5AF2','#64D2FF','#FF453A','#FFD60A','#FF2D55','#5E5CE6','#AC8E68'];

function donutSVG(items,opts){items=(items||[]).filter(i=>Math.abs(i.value||0)>0);if(!items.length)return `<div class="hint">${t('Нет данных','No data')}</div>`;const tot=items.reduce((a,i)=>a+Math.abs(i.value||0),0)||1;const R=54,r=33,cx=64,cy=64;let ang=-Math.PI/2;let arcs='';

  return `<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap"><svg viewBox="0 0 128 128" style="width:124px;height:124px;flex:0 0 auto">${arcs}${opts&&opts.center?`<text x="64" y="61" text-anchor="middle" fill="#fff" style="font:13px var(--mono)">${opts.center}</text><text x="64" y="77" text-anchor="middle" fill="var(--dim)" style="font:9px Inter">${opts.centerLabel||''}</text>`:''}</svg><div style="flex:1;min-width:150px">${legend}</div></div>`;}
function cashProjChart(){const bal0=totalBalance();const net=pnl('mo','all').ebit;const months=12;const pts=[];for(let m=0;m<=months;m++)pts.push(bal0+net*m);

function burnupChart(p){const m=p.model,c=calcCollection(m),target=c.target||1;const ents=collEntries(m).slice().reverse();

function invoicedHours(m){return (m.invoices||[]).reduce((s,i)=>s+(i.hours||0),0);}
function invoiceCard(p,c){const m=p.model,inv=m.invoices||[];const rate=m.ratePerUnit||0;const invH=invoicedHours(m);const ready=Math.max(0,c.accepted-invH);

function invoiceFromAccepted(pid){const p=DB.projects.find(x=>x.id===pid);const c=calcCollection(p.model);const h=Math.max(0,c.accepted-invoicedHours(p.model));if(h<=0){toast(t('Нет новых принятых часов','No new accepted hours'));return;}p.model.invoices=p.model.invoices||[];p.model.invoices.unshift({id:uid('inv'),date:new Date().toISOString().slice(0,10),hours:h,amount:Math.round(h*(p.model.ratePerUnit||0)),status:'draft'});logAudit('invoice',fmt0(h)+' '+(p.model.unit||'ч')+' · '+money(h*(p.model.ratePerUnit||0)));save('projects');render();toast(t('Инвойс создан','Invoice created'));}

        ${bs.length?bs.map(b=>batchRowOwner(p,b)).join(''):`<div class="empty"><b>${t('Наборов ещё нет','No batches yet')}</b>${t('Создай набор вручную или загрузи готовый план 10K','Add a batch or load the ready 10K plan')}<div style="margin-top:12px;display:flex;gap:8px;justify-content:center"><button class="btn" onclick="addBatch('${p.id}')">+ ${t('Набор','Batch')}</button><button class="btn pri" onclick="seed10K('${p.id}')">${t('Загрузить план 10K','Load 10K plan')}</button></div></div>`}

function metricCards(p,c){
  if(p.type==='datacol')return stat(t('Контракт','Contract'),money(c.revenue))+stat(t('Прибыль','Profit'),money(c.profit),'',c.profit>=0?'pos':'neg')+stat(t('Себестоимость часа','Cost/hour'),money(c.costPerHour))+stat(t('Срок','Time'),(c.months?fmt1(c.months):'∞')+' '+t('мес','mo'));
  if(p.type==='collection'){const f=c.forecast;return stat(t('Цель','Target'),fmt0(c.target),c.unit)+stat(t('Собрано','Collected'),pct(c.progress),fmt0(c.collected)+'/'+fmt0(c.target))+stat(t('Готово к','ETA'),f.eta||'—',f.ratePerWeek?fmt0(f.ratePerWeek)+'/'+t('нед','wk'):t('нет данных','no data'))+stat(t('Контракт','Contract'),money(c.revenue),'',c.profit>=0?'pos':'')}
  return stat(t('Выручка / мес','Revenue / mo'),money(c.monthlyRevenue))+stat(t('Прибыль / мес','Profit / mo'),money(c.monthlyProfit),'',c.monthlyProfit>=0?'pos':'neg')+stat(t('Маржа','Margin'),pct(c.margin),'',c.monthlyProfit>=0?'pos':'neg')+stat(t('Стадия','Stage'),sL(p.stage),(STAGES[p.stage].prob*100)+'%');
}

function econSummary(c){if(c.isFormula||c.isCollection)return '';const oneOff=c.months!==undefined;const rev=oneOff?c.revenue:c.monthlyRevenue,prof=oneOff?c.profit:c.monthlyProfit,cost=rev-prof;let h='';if(!oneOff)h+=`<div class="grid g2" style="margin-bottom:10px">${stat(t('Выручка / год','Revenue / yr'),money(rev*12))}${stat(t('Прибыль / год','Profit / yr'),money(prof*12),'',prof>=0?'pos':'neg')}</div>`;h+=`<div style="margin-bottom:10px">${barChartSVG([{label:t('Выручка','Revenue'),value:rev,color:'var(--green)'},{label:t('Себестоимость','Cost'),value:cost,color:'var(--red)'},{label:t('Прибыль','Profit'),value:prof,color:prof>=0?'var(--blue)':'var(--red)'}])}</div>`;return h;}
function barChartSVG(items){const max=Math.max(1,...items.map(i=>Math.abs(i.value||0)));const W=320,row=34,H=items.length*row;return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${items.map((it,i)=>{const y=i*row;const w=Math.max(2,Math.abs(it.value||0)/max*W);return `<text x="0" y="${y+12}" fill="var(--mid)" style="font:11px Inter">${it.label}</text><text x="${W}" y="${y+12}" text-anchor="end" fill="#fff" style="font:11px var(--mono)">${money(it.value||0)}</text><rect x="0" y="${y+18}" width="${W}" height="6" rx="3" fill="var(--b1)"/><rect x="0" y="${y+18}" width="${w}" height="6" rx="3" fill="${it.color}"/>`;}).join('')}</svg>`;}
function calcResults(c){
  const oneOff=c.months!==undefined;
  const rev=oneOff?c.revenue:c.monthlyRevenue,prof=oneOff?c.profit:c.monthlyProfit,cost=rev-prof;
  const suff=oneOff?'':'/'+t('мес','mo');
  let h=`<div class="grid g3" style="margin-bottom:12px">${stat(t('Выручка','Revenue')+suff,money(rev))}${stat(t('Прибыль','Profit')+suff,money(prof),'',prof>=0?'pos':'neg')}${stat(t('Маржа','Margin'),pct(c.margin),'',prof>=0?'pos':'neg')}</div>`;
  if(!oneOff)h+=`<div class="grid g2" style="margin-bottom:14px">${stat(t('Выручка / год','Revenue / yr'),money(rev*12))}${stat(t('Прибыль / год','Profit / yr'),money(prof*12),'',prof>=0?'pos':'neg')}</div>`;
  else h+=`<div class="grid g2" style="margin-bottom:14px">${stat(t('Срок','Time'),(c.months?fmt1(c.months):'∞')+' '+t('мес','mo'))}${stat(t('Себестоимость часа','Cost / hour'),money(c.costPerHour||0))}</div>`;
  h+=`<div class="card" style="margin-bottom:14px"><h2>${t('Структура','Structure')}${oneOff?'':' · '+t('в месяц','monthly')}</h2>${barChartSVG([{label:t('Выручка','Revenue'),value:rev,color:'var(--green)'},{label:t('Себестоимость','Cost'),value:cost,color:'var(--red)'},{label:t('Прибыль','Profit'),value:prof,color:prof>=0?'var(--blue)':'var(--red)'}])}</div>`;
  h+=`<div class="card"><h2>${t('Разбивка','Breakdown')}</h2>${breakdownTable(c)}</div>`;
  return h;
}

  ${list.length===0?`<div class="empty"><b>${t('Задач нет','No tasks')}</b>${emp?t('Тебе пока ничего не назначено','Nothing assigned yet'):t('Создай первую','Create the first one')}</div>`:groups.map(([g,lab,col])=>{const gl=list.filter(x=>(x.status||'todo')===g);if(!gl.length)return '';return `<div style="margin-top:16px"><div class="lbl" style="color:${col};margin-bottom:8px">${lab} · ${gl.length}</div><div class="card" style="padding:6px 16px">${gl.map(x=>`<div class="row"><div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><input type="checkbox" style="width:auto" ${g==='done'?'checked':''} onchange="toggleTask('${x.id}')"><span class="mono" style="color:var(--ghost);font-size:11px">${x.id}</span><span class="ttitle" style="cursor:pointer;${g==='done'?'text-decoration:line-through;color:var(--dim)':''}" onclick="openTask('${x.id}')">${x.title}</span>${x.label?`<span class="tag">${x.label}</span>`:''}${x.due?`<span class="tag ${(x.due<today&&g!=='done')?'overdue':''}">${x.due}${(x.due<today&&g!=='done')?' · '+t('просрочено','overdue'):''}</span>`:''}${(x.comments||[]).length?`<span class="cbadge">${t('коммент.','comments')}: ${(x.comments||[]).length}</span>`:''}${x.projectId?`<span class="tag" style="color:var(--purple)">${(DB.projects.find(p=>p.id===x.projectId)||{}).name||t('проект','project')}</span>`:''}</div><div style="display:flex;gap:8px;align-items:center"><span class="muted mono" style="font-size:11px">${personName(x.assigneeId)}</span><span class="pill" style="color:${(PRIO[x.priority]||{}).c};border:1px solid var(--b2)">${pL(x.priority)}</span><button class="btn sm" onclick="openTask('${x.id}')">${t('Открыть','Open')}</button>${emp?'':`<button class="btn sm danger" onclick="delTask('${x.id}')">×</button>`}</div></div>`).join('')}</div></div>`;}).join('')}`;

function newTask(){modal(`<h3>${t('Новая задача','New task')}</h3><div class="field-stack"><div class="fs"><label>${t('Название','Title')}</label><input id="tk-title"></div><div class="fs"><label>${t('Исполнитель','Assignee')}</label><select id="tk-ass"><option value="">— ${t('не назначен','unassigned')} —</option>${DB.payroll.people.map(p=>`<option value="${p.id}">${p.name} · ${rL(p.role)}</option>`).join('')}</select></div><div class="fs"><label>${t('Приоритет','Priority')}</label><select id="tk-prio"><option value="urgent">${pL('urgent')}</option><option value="high">${pL('high')}</option><option value="med" selected>${pL('med')}</option></select></div><div class="fs"><label>${t('Метка','Label')}</label><input id="tk-label" placeholder="BD / Legal / Ops"></div><div class="fs"><label>${t('Статус','Status')}</label><select id="tk-status"><option value="todo">Todo</option><option value="blocked">Blocked</option></select></div><div class="fs"><label>${t('Дедлайн','Due date')}</label><input id="tk-due" type="date"></div><div class="fs"><label>${t('Проект','Project')}</label><select id="tk-prj"><option value="">— ${t('без проекта','no project')} —</option>${DB.projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="fs"><label>${t('Описание','Description')}</label><textarea id="tk-desc"></textarea></div></div><div class="actions"><button class="btn" onclick="closeModal()">${t('Отмена','Cancel')}</button><button class="btn pri" onclick="saveTask()">${t('Добавить','Add')}</button></div>`);}

function openTask(id){const x=DB.tasks.find(t=>t.id===id);if(!x)return;const canEdit=currentRole!=='employee';const comments=x.comments||[];
  let b=`<h3>${x.id}${canEdit?'':' · '+x.title}</h3><div class="field-stack">`;
  if(canEdit){b+=`<div class="fs"><label>${t('Название','Title')}</label><input id="td-title" value="${(x.title||'').replace(/"/g,'&quot;')}"></div>

  b+=`<div class="fs"><label>${t('Статус','Status')}</label><select id="td-status"><option value="todo" ${x.status==='todo'?'selected':''}>Todo</option><option value="blocked" ${x.status==='blocked'?'selected':''}>Blocked</option><option value="done" ${x.status==='done'?'selected':''}>Done</option></select></div>`;
  if(canEdit){b+=`<div class="fs"><label>${t('Приоритет','Priority')}</label><select id="td-prio"><option value="urgent" ${x.priority==='urgent'?'selected':''}>${pL('urgent')}</option><option value="high" ${x.priority==='high'?'selected':''}>${pL('high')}</option><option value="med" ${x.priority==='med'?'selected':''}>${pL('med')}</option></select></div>

    <div class="fs"><label>${t('Метка','Label')}</label><input id="td-label" value="${(x.label||'').replace(/"/g,'&quot;')}"></div>
    <div class="fs"><label>${t('Проект','Project')}</label><select id="td-prj"><option value="">— ${t('без проекта','no project')} —</option>${DB.projects.map(p=>`<option value="${p.id}" ${x.projectId===p.id?'selected':''}>${p.name}</option>`).join('')}</select></div>
    <div class="fs"><label>${t('Описание','Description')}</label><textarea id="td-desc">${(x.desc||'').replace(/</g,'&lt;')}</textarea></div>`;}
  else{b+=`<div class="fs"><label>${t('Описание','Description')}</label><div class="hint">${(x.desc||'—').replace(/</g,'&lt;')}</div></div>${x.due?`<div class="fs"><label>${t('Дедлайн','Due date')}</label><div class="hint">${x.due}</div></div>`:''}`;}
  b+=`</div><div class="fgroup">${t('Комментарии','Comments')}</div><div style="max-height:240px;overflow:auto;margin-bottom:10px">${comments.length?comments.map(c=>`<div class="comment"><div class="meta"><b>${c.author}</b> · ${c.ts}</div><div>${(c.text||'').replace(/</g,'&lt;')}</div></div>`).join(''):`<div class="hint">${t('Пока нет комментариев','No comments yet')}</div>`}</div>
    <textarea id="cm-text" placeholder="${t('Написать комментарий…','Write a comment…')}"></textarea>
    <div class="actions" style="margin-top:12px"><button class="btn" onclick="closeModal()">${t('Закрыть','Close')}</button><button class="btn" onclick="addComment('${id}')">${t('Комментировать','Comment')}</button><button class="btn pri" onclick="saveTaskDetail('${id}')">${canEdit?t('Сохранить','Save'):t('Сохранить статус','Save status')}</button></div>`;
  modal(b);
}
function saveTaskDetail(id){const x=DB.tasks.find(t=>t.id===id);if(!x)return;const g=k=>document.getElementById(k);
  if(currentRole!=='employee'){if(g('td-title'))x.title=g('td-title').value||x.title;if(g('td-ass'))x.assigneeId=g('td-ass').value;if(g('td-prio'))x.priority=g('td-prio').value;if(g('td-due'))x.due=g('td-due').value;if(g('td-label'))x.label=g('td-label').value;if(g('td-prj'))x.projectId=g('td-prj').value;if(g('td-desc'))x.desc=g('td-desc').value;}

function addComment(id){const x=DB.tasks.find(t=>t.id===id);if(!x)return;const ta=document.getElementById('cm-text');const txt=(ta.value||'').trim();if(!txt)return;x.comments=x.comments||[];const viewer=currentRole==='owner'?rL('owner'):(personName(currentUserId)||rL(currentRole));x.comments.push({id:uid('cm'),author:viewer,text:txt,ts:new Date().toISOString().slice(0,16).replace('T',' ')});save('tasks');openTask(id);}

function resetAll(){confirmModal(t('Сбросить ВСЕ данные? Сделай экспорт заранее.','Reset ALL data? Export first.'),()=>{const d=defaults();DB={settings:d.settings,projects:d.projects,costs:d.costs,tasks:d.tasks,payroll:d.payroll,tx:d.tx,audit:[]};['settings','projects','costs','tasks','payroll','tx','audit'].forEach(save);renderRoleControls();render();toast(t('Сброшено','Reset'));});}

/* ── export / import ── */
function exportData(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='worldsense-os-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast(t('Экспортировано','Exported'));}
function importPrompt(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);DB.settings=d.settings||DB.settings;DB.projects=d.projects||[];DB.costs=d.costs||[];DB.tasks=d.tasks||[];DB.payroll=d.payroll||{people:[]};DB.tx=d.tx||[];['settings','projects','costs','tasks','payroll','tx'].forEach(save);renderRoleControls();render();toast(t('Импортировано','Imported'));}catch(e){toast(t('Ошибка файла','File error'));}};r.readAsText(f);};inp.click();}

/* ── modal ── */
function modal(h){document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${h}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
let _confirmCb=null;
function confirmModal(msg,onYes,danger){_confirmCb=onYes;modal(`<h3 style="margin-top:0">${msg}</h3><div class="actions"><button class="btn" onclick="closeModal()">${t('Отмена','Cancel')}</button><button class="btn ${danger===false?'pri':'danger'}" onclick="confirmYes()">${t('Да','Yes')}</button></div>`);}
function confirmYes(){const cb=_confirmCb;_confirmCb=null;closeModal();if(cb)cb();}

/* ── boot ── */
/* ── auth ── */
function hashPin(s){let h=2166136261;s=String(s);for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return (h>>>0).toString(16);}
function authUsers(){return (DB.auth&&DB.auth.users)||[];}
function currentUser(){return authUsers().find(u=>u.id===sessionUserId)||null;}
function applyUser(u){sessionUserId=u.id;sSet('ws3:session',u.id);currentRole=u.role;currentUserId=u.personId||null;const allowed=tabsFor(currentRole).map(x=>x[0]);if(!allowed.includes(view))view=allowed[0];selProject=null;const root=document.getElementById('login-root');if(root){root.style.display='none';root.innerHTML='';}renderRoleControls();render();toast(t('Вход выполнен','Signed in')+' · '+u.name);}
function showLogin(){const root=document.getElementById('login-root');if(!root)return;root.style.display='flex';const users=authUsers();const logo=(document.querySelector('#top .brand svg')||{}).outerHTML||'WorldSense';
  if(sbActive()){root.innerHTML=`<div class="loginbox"><div class="lg-brand">${logo}</div><h2>${t('Вход','Sign in')} · Supabase</h2><div class="sub">${t('Первый зарегистрированный аккаунт станет владельцем','First registered account becomes owner')}</div><div class="fs"><label>Email</label><input id="sb-email" type="email" autocomplete="username" inputmode="email"></div><div class="fs"><label>${t('Пароль','Password')}</label><input id="sb-pass" type="password" autocomplete="current-password"></div><button class="btn pri" style="width:100%" onclick="sbSignIn()">${t('Войти','Sign in')}</button><div style="display:flex;gap:8px;margin-top:8px"><button class="btn" style="flex:1" onclick="sbSignUp()">${t('Создать аккаунт','Sign up')}</button><button class="btn" style="flex:1" onclick="sbMagicLink()">${t('Ссылка на почту','Magic link')}</button></div><div class="lg-err" id="lg-err"></div></div>`;setTimeout(()=>{const e=document.getElementById('sb-email');if(e)try{e.focus();}catch(_){}}, 40);return;}
  if(!users.length){root.innerHTML=`<div class="loginbox"><div class="lg-brand">${logo}</div><h2>${t('Первый вход','First sign-in')}</h2><div class="sub">${t('Создайте владельца и PIN','Create the owner and a PIN')}</div><div class="fs"><label>${t('Имя','Name')}</label><input id="su-name" value="Ислам"></div><div class="fs"><label>${t('PIN (4+ цифры)','PIN (4+ digits)')}</label><input id="su-pin" type="password" inputmode="numeric" autocomplete="new-password"></div><button class="btn pri" style="width:100%" onclick="setupOwner()">${t('Создать и войти','Create & enter')}</button><div class="lg-err" id="lg-err"></div></div>`;}
  else{root.innerHTML=`<div class="loginbox"><div class="lg-brand">${logo}</div><h2>${t('Вход','Sign in')}</h2><div class="sub">${t('Выберите пользователя и введите PIN','Pick a user, enter PIN')}</div><div class="fs"><label>${t('Пользователь','User')}</label><select id="lg-user">${users.map(u=>`<option value="${u.id}">${u.name} · ${rL(u.role)}</option>`).join('')}</select></div><div class="fs"><label>PIN</label><input id="lg-pin" type="password" inputmode="numeric" autocomplete="off"></div><button class="btn pri" style="width:100%" onclick="doLogin()">${t('Войти','Sign in')}</button><div class="lg-err" id="lg-err"></div></div>`;setTimeout(()=>{const p=document.getElementById('lg-pin');if(p){p.onkeydown=e=>{if(e.key==='Enter')doLogin();};try{p.focus();}catch(e){}}},40);}}
function doLogin(){const id=document.getElementById('lg-user').value;const pin=document.getElementById('lg-pin').value;const u=authUsers().find(x=>x.id===id);const err=document.getElementById('lg-err');if(!u||u.pin!==hashPin(pin)){if(err)err.textContent=t('Неверный PIN','Wrong PIN');return;}applyUser(u);}
function setupOwner(){const name=(document.getElementById('su-name').value||'Owner').trim();const pin=document.getElementById('su-pin').value;const err=document.getElementById('lg-err');if(!/^[0-9]{4,}$/.test(pin)){if(err)err.textContent=t('PIN — минимум 4 цифры','PIN — at least 4 digits');return;}const u={id:uid('u'),name,role:'owner',personId:null,pin:hashPin(pin)};DB.auth.users=[u];save('auth');applyUser(u);}
function logout(){if(sbActive()){sbSignOut();return;}sessionUserId=null;sSet('ws3:session',null);currentRole='owner';showLogin();}
function inputModal(msg,onOk,opts){opts=opts||{};_inputCb=onOk;modal(`<h3 style="margin-top:0">${msg}</h3><div class="fs"><input id="im-val" type="${opts.type||'text'}" inputmode="${opts.inputmode||'text'}"></div><div class="actions"><button class="btn" onclick="closeModal()">${t('Отмена','Cancel')}</button><button class="btn pri" onclick="inputOk()">OK</button></div>`);setTimeout(()=>{const v=document.getElementById('im-val');if(v)try{v.focus();}catch(e){}},40);}
function inputOk(){const v=(document.getElementById('im-val')||{}).value;const cb=_inputCb;_inputCb=null;closeModal();if(cb)cb(v);}
function viewUsers(){const us=authUsers();return `<div class="card" style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h2 style="margin:0">${t('Доступы (входы)','Access (logins)')}</h2><button class="btn sm" onclick="newUser()">+ ${t('Пользователь','User')}</button></div>${us.length?`<table><tr><th>${t('Имя','Name')}</th><th>${t('Роль','Role')}</th><th>${t('Человек','Person')}</th><th></th></tr>${us.map(u=>`<tr><td>${u.name}${u.id===sessionUserId?` <span class="tag">${t('вы','you')}</span>`:''}</td><td>${rL(u.role)}</td><td class="muted">${u.personId?(personName(u.personId)||'—'):'—'}</td><td style="white-space:nowrap;text-align:right"><button class="btn sm" onclick="resetPin('${u.id}')">PIN</button> ${u.id!==sessionUserId?`<button class="btn sm danger" onclick="delUser('${u.id}')">×</button>`:''}</td></tr>`).join('')}</table>`:`<div class="hint">${t('Нет пользователей','No users')}</div>`}<div class="hint" style="margin-top:8px">${t('Локальный вход по PIN (до перехода на Supabase). Привяжи сотрудника к человеку из команды — он увидит только свои проекты сбора.','Local PIN sign-in (until Supabase). Link an employee to a team person — they see only their own collection projects.')}</div></div>`;}
function newUser(){const people=DB.payroll.people;modal(`<h3>${t('Новый пользователь','New user')}</h3><div class="field-stack"><div class="fs"><label>${t('Имя','Name')}</label><input id="u-name"></div><div class="fs"><label>${t('Роль','Role')}</label><select id="u-role"><option value="employee">${rL('employee')}</option><option value="manager">${rL('manager')}</option><option value="owner">${rL('owner')}</option></select></div><div class="fs"><label>${t('Человек (для сотрудника)','Person (for employee)')}</label><select id="u-person"><option value="">— ${t('нет','none')} —</option>${people.map(p=>`<option value="${p.id}">${p.name} · ${rL(p.role)}</option>`).join('')}</select></div><div class="fs"><label>PIN (4+)</label><input id="u-pin" type="password" inputmode="numeric"></div></div><div class="actions"><button class="btn" onclick="closeModal()">${t('Отмена','Cancel')}</button><button class="btn pri" onclick="saveUser()">${t('Добавить','Add')}</button></div>`);}
function saveUser(){const pin=document.getElementById('u-pin').value;if(!/^[0-9]{4,}$/.test(pin)){toast(t('PIN — минимум 4 цифры','PIN — at least 4 digits'));return;}const u={id:uid('u'),name:document.getElementById('u-name').value||'—',role:document.getElementById('u-role').value,personId:document.getElementById('u-person').value||null,pin:hashPin(pin)};DB.auth.users=authUsers().concat([u]);save('auth');logAudit('add_user',u.name+' · '+rL(u.role));closeModal();render();}
function resetPin(id){const u=authUsers().find(x=>x.id===id);if(!u)return;inputModal(t('Новый PIN для','New PIN for')+' '+u.name,(pin)=>{if(!/^[0-9]{4,}$/.test(pin)){toast(t('PIN — минимум 4 цифры','PIN — at least 4 digits'));return;}u.pin=hashPin(pin);save('auth');logAudit('reset_pin',u.name);toast(t('PIN обновлён','PIN updated'));},{type:'password',inputmode:'numeric'});}
function delUser(id){const u=authUsers().find(x=>x.id===id);confirmModal(t('Удалить доступ','Delete login')+(u?` «${u.name}»`:'')+'?',()=>{DB.auth.users=authUsers().filter(x=>x.id!==id);save('auth');logAudit('del_user',u?u.name:id);render();});}
async function boot(){
  if(SB_URL&&SB_ANON){_sbcfg={url:SB_URL,key:SB_ANON};try{await localSet('ws3:sbcfg',_sbcfg);}catch(e){}}
  else{_sbcfg=await localGet('ws3:sbcfg');}
  if(sbConfigured()){
    DB.settings=Object.assign(defaults().settings,{supabaseUrl:_sbcfg.url,supabaseKey:_sbcfg.key});
    const ok=await sbInit();
    if(ok){
      let sess=null;try{const r=await sb.auth.getSession();sess=r.data&&r.data.session;}catch(e){}
      if(sess){await sbAfterLogin();return;}
      renderRoleControls();showLogin();return;
    }
    sb=null; // init failed → local fallback
  }
  await loadAllFromStore();
  sessionUserId=await sGet('ws3:session')||null;
  const u=currentUser();
  if(u){currentRole=u.role;currentUserId=u.personId||null;renderRoleControls();render();}
  else{renderRoleControls();showLogin();}
}
function migrateCollections(){let changed=false;DB.projects.forEach(p=>{if(p.type==='collection'&&p.model&&p.model.batches){p.model.batches.forEach(b=>{if(!(b.processes&&b.processes.length)){const ff=FACTORY_PLAN.find(x=>x.n===b.name);if(ff){b.processes=ff.proc.map(nm=>({id:uid('pr'),name:nm,target:100}));b.target=ff.proc.length*100;changed=true;}}});if(p.model.dailyPay==null){p.model.dailyPay=50000;changed=true;}if(p.model.referralPool==null){p.model.referralPool=50000;changed=true;}if((p.model.batches||[]).length&&(p.model.batches||[]).every(b=>!b.referral)){distributeReferrals(p.model);changed=true;}}});if(changed)save('projects');}
boot();
</script>
